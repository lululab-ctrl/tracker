function renderBudget(c) {
  try {
  if(!DB.budgetVarExp) DB.budgetVarExp=[];
  if(!DB.budgetSavings) DB.budgetSavings=[];

  // Build month options: current month ± 12
  const now = new Date();
  const monthOptions = [];
  for(let i = -6; i <= 6; i++) {
    const d = new Date(now.getFullYear(), now.getMonth() + i, 1);
    const val = d.getFullYear()+'-'+String(d.getMonth()+1).padStart(2,'0');
    const label = d.toLocaleString('default',{month:'long',year:'numeric'});
    monthOptions.push({val, label});
  }
  // ensure budgetMonth is in the list
  const nowYM = now.getFullYear()+'-'+String(now.getMonth()+1).padStart(2,'0');
  if(!monthOptions.find(m=>m.val===budgetMonth)) budgetMonth = nowYM;

  // Income is date-specific — only count entries whose payday (day1) falls in the selected month
  const incomeForMonth = DB.budgetIncome.filter(i=>{
    const d = (i.day1||'').slice(0,7); // day1 is the actual payday date YYYY-MM-DD
    return d === budgetMonth;
  });
  const totalIncome = incomeForMonth.reduce((s,i)=>s+parseFloat(i.amount||0),0);
  // Recurring always counts (monthly fixed bills)
  const totalRecurr = DB.budgetBills.reduce((s,b)=>s+parseFloat(b.amount||0),0);
  // Variable expenses filtered to selected month
  const varForMonth = DB.budgetVarExp.filter(e=>(e.date||'').slice(0,7)===budgetMonth);
  const totalVar    = varForMonth.reduce((s,e)=>s+parseFloat(e.amount||0),0);
  // Savings also filtered to selected month
  const savingsForMonth = (DB.budgetSavings||[]).filter(g=>(g.date||'').slice(0,7)===budgetMonth);
  const totalSaved = savingsForMonth.reduce((s,g)=>s+parseFloat(g.amount||0),0);

  // ── Carryover: net surplus/deficit from all prior months ──
  // Only carry what's LEFT after income - recurring - variable each month.
  // Current month's income is added separately, so carryover must NOT re-include prior income.
  if(!DB.budgetCarryover) DB.budgetCarryover = {};

  // Find the earliest month with any variable expense
  const allTxMonths = [...new Set([
    ...DB.budgetVarExp.map(e=>(e.date||'').slice(0,7)),
    ...DB.budgetIncome.map(i=>(i.day1||'').slice(0,7)),
  ].filter(Boolean))].sort();
  const earliestMonth = allTxMonths[0] || null;

  // Compute cumulative net from earliestMonth up to (not including) targetYM
  // Net per month = income - recurring - varExpenses
  // Carryover into targetYM is the running balance of all prior months
  function computeCarryover(targetYM) {
    if(!earliestMonth || earliestMonth >= targetYM) return 0;
    let carry = 0;
    let cur = earliestMonth;
    while(cur < targetYM) {
      const inc = DB.budgetIncome.filter(i=>(i.day1||'').slice(0,7)===cur)
                     .reduce((s,i)=>s+parseFloat(i.amount||0),0);
      const rec = DB.budgetBills.reduce((s,b)=>s+parseFloat(b.amount||0),0);
      const varExp = DB.budgetVarExp
        .filter(e=>(e.date||'').slice(0,7)===cur)
        .reduce((s,e)=>s+parseFloat(e.amount||0),0);
      // Net for this month: what's left after paying everything
      const net = inc - rec - varExp;
      carry += net;
      // Advance one month
      const [y,m] = cur.split('-').map(Number);
      cur = m===12 ? (y+1)+'-01' : y+'-'+String(m+1).padStart(2,'0');
    }
    return carry;
  }

  // Carryover = cumulative net of all months BEFORE the current budgetMonth
  // This represents leftover cash brought into this month
  // Current month then adds its own fresh income on top
  const carryover = computeCarryover(budgetMonth);

  const totalOut    = totalRecurr + totalVar;
  const remaining   = totalIncome + carryover - totalOut;
  const remainingColor = remaining >= 0 ? 'var(--green)' : 'var(--red)';
  const fmt = n => parseFloat(n||0).toLocaleString('en',{minimumFractionDigits:2,maximumFractionDigits:2});
  const fmtSigned = n => (n>=0?'+':'')+'₱'+Math.abs(n).toLocaleString('en',{minimumFractionDigits:2,maximumFractionDigits:2});

  const selectedLabel = monthOptions.find(m=>m.val===budgetMonth)?.label || budgetMonth;
  const nowYM2 = now.getFullYear()+'-'+String(now.getMonth()+1).padStart(2,'0');

  c.innerHTML=`
  ${pageStack.length?backBtn('Back'):''}

  <!-- MONTH SELECTOR -->
  <div style="display:flex;align-items:center;gap:10px;margin-bottom:18px;flex-wrap:wrap">
    <div style="font-family:var(--font-display);font-size:1rem;color:var(--text-mid)">Viewing</div>
    <select class="form-select" id="budgetMonthPicker" style="width:200px;font-size:.82rem;font-weight:500" onchange="budgetMonth=this.value;renderBudget(document.getElementById('content'))">
      ${monthOptions.map(m=>`<option value="${m.val}"${m.val===budgetMonth?' selected':''}>${m.label}</option>`).join('')}
    </select>
    ${budgetMonth !== nowYM2 ? `<button class="btn btn-ghost btn-sm" onclick="budgetMonth='${nowYM2}';renderBudget(document.getElementById('content'))">Back to current month</button>` : ''}
  </div>

  <!-- SUMMARY CARDS -->
  <div class="grid-3" style="margin-bottom:20px">
    <div class="card card-sm">
      <div class="stat-label">Income This Month</div>
      <div class="stat-val" style="font-size:1.5rem;color:var(--green)">₱${fmt(totalIncome)}</div>
      <div class="stat-sub">${incomeForMonth.length} source${incomeForMonth.length!==1?'s':''} this month</div>
    </div>
    <div class="card card-sm">
      <div class="stat-label">Recurring</div>
      <div class="stat-val" style="font-size:1.5rem;color:var(--blue)">₱${fmt(totalRecurr)}</div>
      <div class="stat-sub">${DB.budgetBills.length} fixed bill${DB.budgetBills.length!==1?'s':''}</div>
    </div>
    <div class="card card-sm">
      <div class="stat-label">Variable · ${selectedLabel}</div>
      <div class="stat-val" style="font-size:1.5rem;color:var(--purple)">₱${fmt(totalVar)}</div>
      <div class="stat-sub">${varForMonth.length} entr${varForMonth.length!==1?'ies':'y'} in ${selectedLabel}</div>
    </div>
  </div>

  <!-- MONEY IN BANK OVERVIEW -->
  <div class="card" style="margin-bottom:22px;border-left:4px solid var(--green)">
    <div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:14px;flex-wrap:wrap;gap:8px">
      <div>
        <div style="font-family:var(--font-display);font-size:1.2rem;color:var(--text)">🏦 Money in Bank</div>
        <div style="font-size:.72rem;color:var(--text-light);margin-top:2px">Running balance based on all entries</div>
      </div>
      <div style="font-family:var(--font-display);font-size:2rem;color:${remaining>=0?'var(--green)':'var(--red)'}">
        ${remaining>=0?'+':'−'}₱${Math.abs(remaining).toLocaleString('en',{minimumFractionDigits:2,maximumFractionDigits:2})}
      </div>
    </div>
    <div style="display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-bottom:14px">
      <div style="background:var(--green-bg);border-radius:var(--radius-sm);padding:12px 14px">
        <div style="font-size:.62rem;letter-spacing:.12em;text-transform:uppercase;color:var(--green);font-weight:600;margin-bottom:6px">💰 Credits (Money In)</div>
        <div style="display:flex;justify-content:space-between;font-size:.78rem;color:var(--text);margin-bottom:4px">
          <span>Monthly Income</span><span style="font-weight:600">₱${fmt(totalIncome)}</span>
        </div>
        ${carryover!==0?`
        <div style="display:flex;justify-content:space-between;font-size:.78rem;color:var(--text);margin-bottom:4px">
          <span style="color:${carryover>=0?'var(--green)':'var(--red)'}">Carried over from previous month</span>
          <span style="font-weight:600;color:${carryover>=0?'var(--green)':'var(--red)'}">${fmtSigned(carryover)}</span>
        </div>`:''}
        <div style="display:flex;justify-content:space-between;font-size:.78rem;color:var(--text);margin-bottom:4px">
          <span>Savings Added</span><span style="font-weight:600">₱${fmt(totalSaved)}</span>
        </div>
        <div style="border-top:1px solid var(--border);margin-top:6px;padding-top:6px;display:flex;justify-content:space-between;font-size:.82rem;font-weight:700;color:var(--green)">
          <span>Total In</span><span>₱${fmt(totalIncome+totalSaved+(carryover>0?carryover:0))}</span>
        </div>
      </div>
      <div style="background:var(--red-bg);border-radius:var(--radius-sm);padding:12px 14px">
        <div style="font-size:.62rem;letter-spacing:.12em;text-transform:uppercase;color:var(--red);font-weight:600;margin-bottom:6px">📤 Debits (Money Out)</div>
        <div style="display:flex;justify-content:space-between;font-size:.78rem;color:var(--text);margin-bottom:4px">
          <span>Recurring Bills</span><span style="font-weight:600">₱${fmt(totalRecurr)}</span>
        </div>
        <div style="display:flex;justify-content:space-between;font-size:.78rem;color:var(--text);margin-bottom:4px">
          <span>Variable Expenses</span><span style="font-weight:600">₱${fmt(totalVar)}</span>
        </div>
        <div style="border-top:1px solid var(--border);margin-top:6px;padding-top:6px;display:flex;justify-content:space-between;font-size:.82rem;font-weight:700;color:var(--red)">
          <span>Total Out</span><span>₱${fmt(totalOut)}</span>
        </div>
      </div>
    </div>
    <div style="background:var(--surface2);border-radius:var(--radius-sm);padding:10px 14px;display:flex;justify-content:space-between;align-items:center">
      <span style="font-size:.78rem;color:var(--text-mid)">Net Balance this month (Income + Carryover − Expenses)</span>
      <span style="font-family:var(--font-display);font-size:1.1rem;color:${remaining>=0?'var(--green)':'var(--red)'};font-weight:600">
        ${remaining>=0?'+':''}₱${remaining.toLocaleString('en',{minimumFractionDigits:2,maximumFractionDigits:2})}
      </span>
    </div>
  </div>

  <!-- BREAKDOWN BAR -->
  <div class="card card-sm" style="margin-bottom:22px">
    <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:10px">
      <span style="font-size:.78rem;font-weight:600;color:var(--text-mid)">Monthly Overview</span>
      <span style="font-size:.72rem;color:${remainingColor};font-weight:500">${remaining>=0?'₱'+fmt(remaining)+' left':'₱'+fmt(Math.abs(remaining))+' over budget'}</span>
    </div>
    <div style="height:12px;border-radius:8px;background:var(--border);overflow:hidden;display:flex">
      ${totalIncome>0?`
        <div style="width:${Math.min(totalRecurr/totalIncome*100,100)}%;background:var(--blue);border-radius:4px 0 0 4px;transition:width .4s" title="Recurring"></div>
        <div style="width:${Math.min(totalVar/totalIncome*100,Math.max(0,100-totalRecurr/totalIncome*100))}%;background:var(--purple);transition:width .4s" title="Variable"></div>
        <div style="flex:1;background:var(--green);opacity:.5;border-radius:0 4px 4px 0" title="Remaining"></div>
      `:'<div style="flex:1;background:var(--border);border-radius:8px"></div>'}
    </div>
    <div style="display:flex;gap:14px;margin-top:10px;flex-wrap:wrap">
      <span style="font-size:.68rem;color:var(--text-light);display:flex;align-items:center;gap:4px"><span style="width:8px;height:8px;border-radius:2px;background:var(--blue);display:inline-block"></span>Recurring</span>
      <span style="font-size:.68rem;color:var(--text-light);display:flex;align-items:center;gap:4px"><span style="width:8px;height:8px;border-radius:2px;background:var(--purple);display:inline-block"></span>Variable</span>
      <span style="font-size:.68rem;color:var(--text-light);display:flex;align-items:center;gap:4px"><span style="width:8px;height:8px;border-radius:2px;background:var(--green);display:inline-block"></span>Free</span>
    </div>
  </div>

  <!-- TOP ROW: Income + Savings -->
  <div class="grid-2" style="align-items:stretch;margin-bottom:22px">
    <div style="display:flex;flex-direction:column;background:var(--surface);border:1px solid var(--border-light);border-radius:var(--radius);padding:16px;box-shadow:var(--shadow-sm)">
      <div class="sec-head" style="margin-bottom:12px"><div class="sec-title">💰 Income</div><button class="btn btn-primary btn-sm" onclick="openIncomeModal()">+ Add</button></div>
      <div id="incomeList" style="flex:1"></div>
    </div>
    <div style="display:flex;flex-direction:column;background:var(--surface);border:1px solid var(--border-light);border-radius:var(--radius);padding:16px;box-shadow:var(--shadow-sm)">
      <div class="sec-head" style="margin-bottom:12px"><div class="sec-title">🐷 Savings</div><button class="btn btn-primary btn-sm" onclick="openSavingsModal()">+ Add</button></div>
      <div id="savingsList" style="flex:1"></div>
    </div>
  </div>

  <!-- BOTTOM ROW: Recurring + Variable -->
  <div class="grid-2" style="align-items:start">

    <!-- RECURRING EXPENSES -->
    <div>
      <div class="sec-head" style="flex-wrap:wrap;gap:6px">
        <div>
          <div class="sec-title">🔁 Recurring Expenses</div>
          <div style="font-size:.7rem;color:var(--text-light);margin-top:2px">Fixed bills every month — rent, utilities, subscriptions</div>
        </div>
        <div style="display:flex;gap:6px;align-items:center;flex-shrink:0">
          <select class="form-select" id="recurFilter" style="width:110px;font-size:.72rem" onchange="fillRecurringList()">
            <option value="">All</option>
            <option value="paid">Paid ✓</option>
            <option value="unpaid">Unpaid</option>
          </select>
          <button class="btn btn-primary btn-sm" onclick="openRecurringModal()">+ Add</button>
        </div>
      </div>
      <div id="recurringList"></div>
    </div>

    <!-- VARIABLE EXPENSES -->
    <div>
      <div class="sec-head" style="flex-wrap:wrap;gap:6px">
        <div>
          <div class="sec-title">📌 Variable Expenses</div>
          <div style="font-size:.7rem;color:var(--text-light);margin-top:2px">Occasional costs — dining out, shared bills, one-time purchases</div>
        </div>
        <div style="display:flex;gap:6px;align-items:center;flex-shrink:0">
          <select class="form-select" id="varFilter" style="width:110px;font-size:.72rem" onchange="fillVarExpList()">
            <option value="">All</option>
            <option value="paid">Paid ✓</option>
            <option value="unpaid">Unpaid</option>
          </select>
          <button class="btn btn-primary btn-sm" onclick="openVarExpModal()">+ Add</button>
        </div>
      </div>
      <div id="varExpList"></div>
    </div>

  </div>`;

  fillIncomeList();
  fillSavingsList();
  fillRecurringList();
  fillVarExpList();
  } catch(err) {
    console.error('renderBudget error:', err);
    c.innerHTML += `<div style="padding:20px;color:var(--red);font-size:.8rem;background:var(--red-bg);border-radius:var(--radius);margin-top:12px">⚠ Error rendering budget: ${err.message}</div>`;
  }
}

function fillIncomeList() {
  const el = document.getElementById('incomeList'); if(!el) return;
  const fmt = n => parseFloat(n||0).toLocaleString('en',{minimumFractionDigits:2,maximumFractionDigits:2});
  const items = DB.budgetIncome.filter(i=>(i.day1||'').slice(0,7)===budgetMonth);
  if(!items.length) {
    el.innerHTML=`<div style="text-align:center;padding:32px 16px;color:var(--text-light)"><div style="font-size:1.8rem;opacity:.3;margin-bottom:8px">💰</div><div style="font-size:.8rem">No income added for this month yet.</div></div>`;
    return;
  }
  const total = items.reduce((s,i)=>s+parseFloat(i.amount||0),0);
  const visible = items.slice(0,3);
  const hidden  = items.slice(3);

  const schedLabel = s => ({monthly:'Monthly',split:'Bi-monthly',biweekly:'Every 2 weeks',weekly:'Weekly'}[s||'monthly']);

  function incCard(i) {
    const chip = i.paySchedule==='split' && i.day1
      ? `<span style="display:inline-flex;align-items:center;gap:5px;background:var(--green-bg);color:var(--green);border-radius:20px;padding:3px 10px;font-size:.68rem;font-weight:600;margin-top:6px">${i.day1} · ₱${fmt(i.amt1)}</span>`
      : '';
    return `
    <div style="padding:10px 0;border-bottom:1px solid var(--border-light);display:flex;flex-direction:column">
      <div style="display:flex;justify-content:space-between;align-items:center;gap:8px">
        <div style="flex:1;min-width:0">
          <div style="font-size:.84rem;font-weight:600;color:var(--text)">${i.type||'Income'}</div>
          <div style="font-size:.68rem;color:var(--text-light);margin-top:1px">${schedLabel(i.paySchedule)}</div>
          ${chip}
          ${i.notes?`<div style="font-size:.68rem;color:var(--text-light);margin-top:4px;font-style:italic">${i.notes}</div>`:''}
        </div>
        <div style="text-align:right;flex-shrink:0">
          <div style="font-family:var(--font-display);font-size:1.15rem;color:var(--green)">₱${fmt(i.amount)}</div>
          <div style="font-size:.6rem;color:var(--text-light);letter-spacing:.04em">/month</div>
        </div>
      </div>
      <div style="display:flex;gap:5px;margin-top:8px">
        <button class="btn btn-ghost btn-sm" style="flex:1" onclick="openIncomeModal('${i.id}')">Edit</button>
        <button class="btn btn-danger btn-sm" onclick="delItem('budgetIncome','${i.id}',()=>renderBudget(document.getElementById('content')))">✕</button>
      </div>
    </div>`;
  }

  el.innerHTML = `<div style="font-size:.72rem;color:var(--text-light);margin-bottom:8px;display:flex;justify-content:space-between">
    <span>${items.length} entr${items.length!==1?'ies':'y'}</span>
    <span style="font-weight:600;color:var(--green)">₱${fmt(total)}/mo</span>
  </div>`;
  visible.forEach(i=>{ el.innerHTML += incCard(i); });
  if(hidden.length) {
    const hd = document.createElement('div');
    hd.id='incomeExtra'; hd.style.display='none';
    hidden.forEach(i=>{ hd.innerHTML += incCard(i); });
    el.appendChild(hd);
    const tb = document.createElement('button');
    tb.className='btn btn-ghost btn-sm';
    tb.style.cssText='width:100%;margin-top:6px;font-size:.7rem';
    tb.textContent=`Show ${hidden.length} more`;
    tb.onclick=function(){ const d=document.getElementById('incomeExtra'),s=d.style.display!=='none'; d.style.display=s?'none':'block'; this.textContent=s?`Show ${hidden.length} more`:'Show less'; };
    el.appendChild(tb);
  }
}

function fillSavingsList() {
  if(!DB.budgetSavings) DB.budgetSavings=[];
  const el = document.getElementById('savingsList'); if(!el) return;
  const fmt = n => parseFloat(n||0).toLocaleString('en',{minimumFractionDigits:2,maximumFractionDigits:2});
  const sorted = [...DB.budgetSavings]
    .filter(g=>(g.date||'').slice(0,7)===budgetMonth)
    .sort((a,b)=>(b.date||'').localeCompare(a.date||''));
  if(!sorted.length) {
    el.innerHTML=`<div style="text-align:center;padding:32px 16px;color:var(--text-light)"><div style="font-size:1.8rem;opacity:.3;margin-bottom:8px">🐷</div><div style="font-size:.8rem">No savings added for this month yet.</div></div>`;
    return;
  }
  const total = sorted.reduce((s,g)=>s+parseFloat(g.amount||0),0);
  const visible = sorted.slice(0,3);
  const hidden  = sorted.slice(3);

  function savCard(g) {
    let dateLabel = g.date||'';
    try {
      if(g.date) {
        const d = new Date(g.date+'T12:00:00');
        dateLabel = d.toLocaleDateString('en-US',{month:'short',day:'numeric',year:'numeric'});
      }
    } catch(e){}
    return `
    <div style="padding:10px 0;border-bottom:1px solid var(--border-light);display:flex;flex-direction:column">
      <div style="display:flex;justify-content:space-between;align-items:center;gap:8px">
        <div style="flex:1;min-width:0">
          <div style="font-size:.84rem;font-weight:600;color:var(--text)">${g.notes||'Savings'}</div>
          <div style="font-size:.68rem;color:var(--text-light);margin-top:1px">${dateLabel}</div>
        </div>
        <div style="text-align:right;flex-shrink:0">
          <div style="font-family:var(--font-display);font-size:1.15rem;color:var(--green)">₱${fmt(g.amount)}</div>
          <span style="display:inline-flex;align-items:center;background:var(--green-bg);color:var(--green);border-radius:20px;padding:2px 8px;font-size:.6rem;font-weight:600;margin-top:2px">saved</span>
        </div>
      </div>
      <div style="display:flex;gap:5px;margin-top:8px">
        <button class="btn btn-ghost btn-sm" style="flex:1" onclick="openSavingsModal('${g.id}')">Edit</button>
        <button class="btn btn-danger btn-sm" onclick="delItem('budgetSavings','${g.id}',()=>renderBudget(document.getElementById('content')))">✕</button>
      </div>
    </div>`;
  }

  el.innerHTML = `<div style="font-size:.72rem;color:var(--text-light);margin-bottom:8px;display:flex;justify-content:space-between">
    <span>${sorted.length} entr${sorted.length!==1?'ies':'y'}</span>
    <span style="font-weight:600;color:var(--green)">Total: ₱${fmt(total)}</span>
  </div>`;
  visible.forEach(g=>{ el.innerHTML += savCard(g); });
  if(hidden.length) {
    const hd = document.createElement('div');
    hd.id='savingsExtra'; hd.style.display='none';
    hidden.forEach(g=>{ hd.innerHTML += savCard(g); });
    el.appendChild(hd);
    const tb = document.createElement('button');
    tb.className='btn btn-ghost btn-sm';
    tb.style.cssText='width:100%;margin-top:6px;font-size:.7rem';
    tb.textContent=`Show ${hidden.length} more`;
    tb.onclick=function(){ const d=document.getElementById('savingsExtra'),s=d.style.display!=='none'; d.style.display=s?'none':'block'; this.textContent=s?`Show ${hidden.length} more`:'Show less'; };
    el.appendChild(tb);
  }
}

function openSavingsModal(id) {
  if(!DB.budgetSavings) DB.budgetSavings=[];
  const item = id ? DB.budgetSavings.find(x=>x.id===id)||{} : {};
  openModal(id?'Edit Savings Entry':'Add to Savings', `
    <div class="form-group"><label class="form-label">Amount Saved (₱)</label>
      <input class="form-input" id="f_samt" type="number" step="0.01" placeholder="0.00" value="${item.amount||''}">
    </div>
    <div class="form-group"><label class="form-label">Notes <span style="font-size:.68rem;color:var(--text-light);font-weight:400">(optional)</span></label>
      <textarea class="form-textarea" id="f_snotes" rows="2" placeholder="e.g. From salary, bonus, savings challenge...">${item.notes||''}</textarea>
    </div>
    ${id?`<div class="form-group"><label class="form-label">Date</label><input class="form-input" id="f_sdate" type="date" value="${item.date||td()}"></div>`:''}
  `, () => {
    const obj = {
      id:id||uid(),
      amount:fv('f_samt'),

function fillRecurringList() {
  const el = document.getElementById('recurringList'); if(!el) return;
  const fmt = n => parseFloat(n||0).toLocaleString('en',{minimumFractionDigits:2,maximumFractionDigits:2});
  const filterVal = document.getElementById('recurFilter')?.value||'';
  let bills = DB.budgetBills;
  if(filterVal==='paid')   bills = bills.filter(b=>b.paid);
  if(filterVal==='unpaid') bills = bills.filter(b=>!b.paid);
  if(!bills.length) {
    el.innerHTML=`<div class="empty" style="padding:24px 16px"><div class="empty-icon" style="font-size:1.6rem">🔁</div><p style="font-size:.8rem">${DB.budgetBills.length?'No items match the filter.':'No recurring expenses yet.<br>Add rent, electricity, water, subscriptions...'}</p></div>`;
    return;
  }
  const total = bills.reduce((s,b)=>s+parseFloat(b.amount||0),0);
  const recurVisible = bills.slice(0,10);
  const recurHidden  = bills.slice(10);
  el.innerHTML = `
    <div style="font-size:.72rem;color:var(--text-light);margin-bottom:10px;display:flex;justify-content:space-between">
      <span>${bills.length} item${bills.length!==1?'s':''}</span>
      <span style="font-weight:600;color:var(--blue)">Total: ₱${fmt(total)}/mo</span>

  function recurCard(b){ return `
    <div class="card card-sm" style="margin-bottom:8px;border-left:3px solid var(--blue)">
      <div style="display:flex;justify-content:space-between;align-items:start;gap:8px">
        <div style="flex:1;min-width:0">
          <div style="font-size:.84rem;font-weight:600;color:var(--text);margin-bottom:2px">${b.label}</div>
          <div style="display:flex;gap:6px;flex-wrap:wrap;align-items:center">
            ${b.category?`<span class="chip">${b.category}</span>`:''}
            <span style="font-size:.65rem;color:var(--text-light)">${b.frequency||'Monthly'}</span>
            ${b.dueDay?`<span style="font-size:.65rem;color:var(--text-light)">· Due day ${b.dueDay}</span>`:''}
            ${b.sharedWith?`<span style="font-size:.65rem;background:var(--purple-bg);color:var(--purple);padding:2px 6px;border-radius:8px">👥 Split with ${b.sharedWith}</span>`:''}
          </div>
        </div>
        <div style="text-align:right;flex-shrink:0">
            <div style="font-family:var(--font-display);font-size:1.1rem;color:var(--blue)">₱${fmt(b.amount)}</div>
            ${b.splitPeople>1?`<div style="font-size:.65rem;color:var(--text-light)">÷${b.splitPeople} of ₱${fmt(b.totalAmount||b.amount)}</div>`:''}
          </div>
      </div>
      ${b.notes?`<div style="font-size:.72rem;color:var(--text-light);margin-top:6px;font-style:italic">${b.notes}</div>`:''}
      <div style="display:flex;gap:5px;margin-top:8px;align-items:center">
        ${b.paid
          ?`<span style="font-size:.65rem;background:var(--green-bg);color:var(--green);padding:3px 8px;border-radius:10px;font-weight:600;cursor:pointer" onclick="toggleBillPaid('${b.id}')">✓ Paid</span>`
          :`<span style="font-size:.65rem;background:var(--red-bg);color:var(--red);padding:3px 8px;border-radius:10px;font-weight:600;cursor:pointer" onclick="toggleBillPaid('${b.id}')">Unpaid</span>`
        }
        <button class="btn btn-ghost btn-sm" style="flex:1" onclick="openRecurringModal('${b.id}')">Edit</button>
        <button class="btn btn-danger btn-sm" onclick="delItem('budgetBills','${b.id}',()=>renderBudget(document.getElementById('content')))">✕</button>
      </div>
    </div>`; }
  recurVisible.forEach(b=>{ el.innerHTML += recurCard(b); });
  if(recurHidden.length) {
    const hd = document.createElement('div');
    hd.id = 'recurExtra'; hd.style.display = 'none';
    recurHidden.forEach(b=>{ hd.innerHTML += recurCard(b); });
    el.appendChild(hd);
    const tb = document.createElement('button');
    tb.className = 'btn btn-ghost btn-sm';
    tb.style.cssText = 'width:100%;margin-top:4px;font-size:.7rem';
    tb.textContent = `Show ${recurHidden.length} more`;
    tb.onclick = function(){ const d=document.getElementById('recurExtra'),s=d.style.display!=='none'; d.style.display=s?'none':'block'; this.textContent=s?`Show ${recurHidden.length} more`:'Show less'; };
    el.appendChild(tb);
  }
}

function addDays(dateStr, days) {
  const d = new Date(dateStr+'T12:00:00');
  d.setDate(d.getDate()+days);
  return d.toISOString().slice(0,10);
}

        <input class="form-input" id="f_iamtp" type="number" step="0.01" placeholder="0.00" value="${(schedule==='biweekly'||schedule==='weekly')?(item.amtPer||''):''}">

function updateIncomeFields(schedule) {
  document.getElementById('inc_monthly').style.display = schedule==='monthly'?'block':'none';
  document.getElementById('inc_split').style.display   = schedule==='split'?'block':'none';
  document.getElementById('inc_period').style.display  = (schedule==='biweekly'||schedule==='weekly')?'block':'none';
  const lbl = document.querySelector('#inc_period .form-label');
  if(lbl) lbl.textContent = `Amount per ${schedule==='weekly'?'week':'2 weeks'} (₱)`;
}

        <span style="font-size:.74rem;color:var(--text-mid)">My share</span>

  `, () => {
    const vTotal = parseFloat(fv('f_vtotal'))||0;

      amount:(vTotal/vSplit).toFixed(2),
      paid:document.getElementById('f_vpaid')?.checked||false,
      date:fv('f_vdate'), category:fv('f_vcat'),
      sharedWith:fv('f_vshared'), notes:fv('f_vnotes')
    };
    if(id) { const i=DB.budgetVarExp.findIndex(x=>x.id===id); DB.budgetVarExp[i]=obj; }
    else DB.budgetVarExp.push(obj);
    save(); closeModal(); renderBudget(document.getElementById('content'));
  });
}

// ══════════════════════════════════════════════
// SHARED HELPERS
// ══════════════════════════════════════════════
function openModal(title, body, saveFn, large=false, saveLabel='Save', danger=false) {
  document.getElementById('mTitle').textContent=title;
  document.getElementById('mBody').innerHTML=body;
  document.getElementById('modalBox').className='modal'+(large?' modal-lg':'');
  const saveBtn = document.getElementById('mFoot').querySelector('.btn-primary');
  if(saveBtn){
    saveBtn.textContent = saveLabel;
    saveBtn.style.background = danger ? '#C43A3A' : '';
    saveBtn.style.boxShadow = danger ? 'none' : '';
  }
  document.getElementById('modalOverlay').classList.add('open');
  modalSaveFn=saveFn;
}
function closeModal(){
  document.getElementById('modalOverlay').classList.remove('open');
  const saveBtn = document.getElementById('mFoot')?.querySelector('.btn-primary');
  if(saveBtn){ saveBtn.textContent='Save'; saveBtn.style.background=''; saveBtn.style.boxShadow=''; }
  const mFoot = document.getElementById('mFoot');
  if(mFoot) mFoot.style.display='';
  modalSaveFn=null;
}
function saveModal(){ if(modalSaveFn) try{ modalSaveFn(); }catch(e){ console.error(e); } }
// Modal only closes via the ✕ button or Cancel — not by clicking outside

function delItem(collection, id, callback) {
  if(!confirm('Delete this item?')) return;
  DB[collection]=DB[collection].filter(x=>x.id!==id);
  save();
  if(callback) callback();
}

// ══════════════════════════════════════════════
// EXPORT / IMPORT
// ══════════════════════════════════════════════
function exportData() {
  const blob=new Blob([JSON.stringify(DB,null,2)],{type:'application/json'});
  const a=document.createElement('a'); a.href=URL.createObjectURL(blob);
  a.download='byherhub_backup_'+td()+'.json'; a.click();
}
function importData() { document.getElementById('importFile').click(); }
function handleImport(inp) {
  const f=inp.files[0]; if(!f) return;
  const r=new FileReader();
  r.onload=e=>{ try{ const data=JSON.parse(e.target.result); if(data.destinations||data.programs){ if(confirm('Import will merge with your current data. Continue?')){ Object.keys(data).forEach(k=>{ if(Array.isArray(data[k])&&Array.isArray(DB[k])){ const ids=new Set(DB[k].map(x=>x.id)); data[k].forEach(item=>{ if(!ids.has(item.id)) DB[k].push(item); }); } }); save(); go('dashboard',null); alert('Import successful!'); } }else alert('Invalid backup file.'); }catch(err){ alert('Could not read file.'); } };
  r.readAsText(f);
}

// ══════════════════════════════════════════════
// SPLASH SCREEN
// ══════════════════════════════════════════════
function enterApp() {
  const splash = document.getElementById('splash');
  splash.classList.add('hide');
  setTimeout(() => { splash.style.display = 'none'; }, 550);
  // Establish session NOW so restorePage won't show splash again on next refresh
  try {
    sessionStorage.setItem('lulu_last', Date.now());
    sessionStorage.setItem('lulu_page', 'dashboard');
  } catch(e){}
  go('dashboard', document.getElementById('nav_dashboard'), false);
  resetIdle();
}

// ══════════════════════════════════════════════
// GLOBAL EVENT DELEGATION
// ══════════════════════════════════════════════
document.addEventListener('click', function(e) {
  const btn = e.target.closest('.dest-action-btn');
  if(!btn) return;
  e.stopPropagation();
  const action = btn.getAttribute('data-action');
  const id = btn.getAttribute('data-id');
  if(!id) return;
  if(action === 'edit') openDestModal(id);
  if(action === 'delete') deleteDest(id);
});

// ══════════════════════════════════════════════
// IDLE TIMEOUT — 5 minutes
// ══════════════════════════════════════════════
const IDLE_MS = 5 * 60 * 1000; // 5 minutes

let idleTimer = null;
function resetIdle() {
  try { sessionStorage.setItem('lulu_last', Date.now()); } catch(e){}
  clearTimeout(idleTimer);
  idleTimer = setTimeout(()=>{
    try {
      sessionStorage.removeItem('lulu_last');
      sessionStorage.removeItem('lulu_page');
      sessionStorage.removeItem('lulu_budget_unlocked');
    } catch(e){}
    budgetUnlocked = false;
    const splash = document.getElementById('splash');
    if(splash) { splash.style.display='flex'; splash.classList.remove('hide'); }
  }, IDLE_MS);
}
['click','touchstart','keydown','scroll','mousemove'].forEach(ev=>{
  document.addEventListener(ev, resetIdle, {passive:true});
});

// ══════════════════════════════════════════════
// INIT — restore last page or show splash
// ══════════════════════════════════════════════
ensureBuiltin();
updateBadges();

function restorePage() {
  try {
    const lastTs   = parseInt(sessionStorage.getItem('lulu_last')||'0');
    const page     = sessionStorage.getItem('lulu_page');
    const now      = Date.now();
    const idledOut = lastTs && (now - lastTs) > IDLE_MS;
    const hasSession = !!lastTs && !!page && !idledOut;

    if(!hasSession) {
      // Fresh open or timed out — clear any stale keys and show splash
      try {
        sessionStorage.removeItem('lulu_last');
        sessionStorage.removeItem('lulu_page');
        sessionStorage.removeItem('lulu_budget_unlocked');
      } catch(e){}
      budgetUnlocked = false;
      // Pre-render dashboard in background (hidden behind splash)
      render('dashboard');
      document.querySelectorAll('.sb-item').forEach(i=>i.classList.remove('active'));
      const nav = document.getElementById('nav_dashboard');
      if(nav) nav.classList.add('active');
      document.getElementById('tbTitle').textContent = 'Dashboard';
      document.getElementById('tbBread').textContent = 'Lulu';
      // Show splash on top
      const splash = document.getElementById('splash');
      if(splash) { splash.style.display='flex'; splash.classList.remove('hide'); }
      return;
    }

    // Active session — restore exactly where user was, no splash
    const savedDestId = sessionStorage.getItem('lulu_destId');
    const savedProgId = sessionStorage.getItem('lulu_progId');
    const savedTab    = parseInt(sessionStorage.getItem('lulu_destTab')||'0');
    if(savedDestId) currentDestId = savedDestId;
    if(savedProgId) currentProgId = savedProgId;
    currentDestTab = savedTab;
    try { if(sessionStorage.getItem('lulu_budget_unlocked')==='1') budgetUnlocked=true; } catch(e){}

    const splash = document.getElementById('splash');
    if(splash) { splash.style.display='none'; }

    const navId = { destination_detail:'nav_destinations', program_detail:'nav_programs' }[page] || ('nav_'+page);
    go(page, document.getElementById(navId), false);

  } catch(e) {
    render('dashboard');
  }
}

// Load from cloud then restore — initDB must NOT navigate on its own
if(cloudEnabled) {
  initDB().then(()=>{ restorePage(); resetIdle(); });
} else {
  restorePage();
  resetIdle();
}
</script>

</body>

<div id="calcPanel" style="
  display:none;position:fixed;bottom:82px;right:26px;z-index:8000;
  width:268px;
  background:rgba(253,250,247,0.97);
  backdrop-filter:blur(12px);
  border:1px solid var(--border-light);
  border-radius:var(--radius-lg);
  box-shadow:var(--shadow-lg);
  overflow:hidden;">
</div>

<script>
(function(){
  // ── State ──
  var expr = '0', hasResult = false;
  var phpRate = null;
  var activeTab = 'calc';

  function toggleCalc() {
    var p = document.getElementById('calcPanel');
    var b = document.getElementById('calcBubble');
    if(p.style.display === 'none') {
      buildPanel();
      p.style.display = 'block';
      b.style.background = 'rgba(184,88,112,0.12)';
      b.style.borderColor = 'rgba(184,88,112,0.4)';
      fetchRate();
    } else {
      p.style.display = 'none';
      b.style.background = 'rgba(255,255,255,0.72)';
      b.style.borderColor = 'rgba(184,88,112,0.18)';
    }
  }
  window.toggleCalc = toggleCalc;

  function buildPanel() {
    var p = document.getElementById('calcPanel');
    p.innerHTML = '';

    // Header tabs
    var hdr = document.createElement('div');
    hdr.style.cssText = 'display:flex;border-bottom:1px solid var(--border)';

    var tCalc = document.createElement('div');
    tCalc.id = 'cTabCalc';
    tCalc.textContent = 'Calculator';
    tCalc.onclick = function(){ switchTab('calc'); };
    styleTab(tCalc, activeTab==='calc');

    var tConv = document.createElement('div');
    tConv.id = 'cTabConv';
    tConv.textContent = '₱ ↔ $';
    tConv.onclick = function(){ switchTab('conv'); };
    styleTab(tConv, activeTab==='conv');

    var closeBtn = document.createElement('button');
    closeBtn.innerHTML = '✕';
    closeBtn.onclick = toggleCalc;
    closeBtn.style.cssText = 'background:none;border:none;cursor:pointer;color:var(--text-light);padding:8px 12px;font-size:.9rem';

    hdr.appendChild(tCalc);
    hdr.appendChild(tConv);
    hdr.appendChild(closeBtn);
    p.appendChild(hdr);

    // Calc panel
    var calcPane = document.createElement('div');
    calcPane.id = 'cPaneCalc';
    calcPane.style.display = activeTab==='calc' ? 'block' : 'none';
    calcPane.style.padding = '12px';

    // Display
    var disp = document.createElement('div');
    disp.style.cssText = 'background:var(--surface2);border:1px solid var(--border);border-radius:var(--radius-sm);padding:8px 12px;margin-bottom:10px;text-align:right;min-height:54px';
    var exprEl = document.createElement('div');
    exprEl.id = 'cExpr';
    exprEl.style.cssText = 'font-size:.68rem;color:var(--text-light);min-height:16px;margin-bottom:2px';
    var resEl = document.createElement('div');
    resEl.id = 'cRes';
    resEl.style.cssText = 'font-family:var(--font-display);font-size:1.6rem;color:var(--text);word-break:break-all';
    resEl.textContent = expr;
    disp.appendChild(exprEl);
    disp.appendChild(resEl);
    calcPane.appendChild(disp);

    // Buttons grid
    var grid = document.createElement('div');
    grid.style.cssText = 'display:grid;grid-template-columns:repeat(4,1fr);gap:5px';

    var rows = [
      ['C','','','⌫'],
      ['7','8','9','÷'],
      ['4','5','6','×'],
      ['1','2','3','−'],
      ['0','.','=','+']
    ];

    rows.forEach(function(row){
      row.forEach(function(k){
        if(k === '') {
          grid.appendChild(document.createElement('div'));
          return;
        }
        var btn = document.createElement('button');
        btn.textContent = k;
        var base = 'border:none;border-radius:var(--radius-sm);padding:11px 6px;font-size:.88rem;cursor:pointer;font-family:var(--font-body);width:100%;transition:background .1s;';
        if(k === '=') {
          btn.style.cssText = base + 'background:var(--accent);color:#fff;font-weight:600;';
          btn.onmouseover = function(){ this.style.background='var(--accent-hover)'; };
          btn.onmouseout  = function(){ this.style.background='var(--accent)'; };
          btn.onclick = doEqual;
        } else if(k === 'C') {
          btn.style.cssText = base + 'background:var(--red-bg);color:var(--red);font-weight:600;border:1px solid rgba(184,88,88,.2)';
          btn.onclick = doClear;
        } else if(k === '⌫') {
          btn.style.cssText = base + 'background:var(--surface2);color:var(--text-mid);border:1px solid var(--border)';
          btn.onclick = doBack;
        } else if('÷×−+'.indexOf(k) !== -1) {
          btn.style.cssText = base + 'background:var(--accent-light);color:var(--accent);font-weight:600;border:1px solid rgba(184,88,112,.15)';
          btn.onmouseover = function(){ this.style.background='rgba(184,88,112,.15)'; };
          btn.onmouseout  = function(){ this.style.background='var(--accent-light)'; };
          (function(key){ btn.onclick = function(){ doOp(key); }; })(k);
        } else {
          btn.style.cssText = base + 'background:var(--surface);color:var(--text);border:1px solid var(--border);font-weight:500';
          btn.onmouseover = function(){ this.style.background='var(--surface2)'; };
          btn.onmouseout  = function(){ this.style.background='var(--surface)'; };
          (function(key){ btn.onclick = function(){ doDigit(key); }; })(k);
        }
        grid.appendChild(btn);
      });
    });

    calcPane.appendChild(grid);
    p.appendChild(calcPane);

    // Converter panel
    var convPane = document.createElement('div');
    convPane.id = 'cPaneConv';
    convPane.style.display = activeTab==='conv' ? 'block' : 'none';
    convPane.style.padding = '14px';

    convPane.innerHTML =
      '<div id="cRateLabel" style="font-size:.68rem;color:var(--text-light);text-align:center;margin-bottom:12px">Fetching live rate...</div>' +
      '<div style="margin-bottom:10px"><div style="font-size:.66rem;letter-spacing:.1em;text-transform:uppercase;color:var(--text-mid);font-weight:500;margin-bottom:5px">PHP (₱)</div>' +
      '<input type="number" id="cPhp" style="width:100%;border:1px solid var(--border);border-radius:var(--radius-sm);padding:9px 12px;font-family:var(--font-body);font-size:.9rem;color:var(--text);background:var(--surface);outline:none" placeholder="0.00" oninput="window._convFromPhp()"></div>' +
      '<div style="text-align:center;color:var(--text-light);margin-bottom:10px;font-size:1.1rem">⇅</div>' +
      '<div style="margin-bottom:10px"><div style="font-size:.66rem;letter-spacing:.1em;text-transform:uppercase;color:var(--text-mid);font-weight:500;margin-bottom:5px">USD ($)</div>' +
      '<input type="number" id="cUsd" style="width:100%;border:1px solid var(--border);border-radius:var(--radius-sm);padding:9px 12px;font-family:var(--font-body);font-size:.9rem;color:var(--text);background:var(--surface);outline:none" placeholder="0.00" oninput="window._convFromUsd()"></div>' +
      '<div id="cConvInfo" style="font-size:.65rem;color:var(--text-light);text-align:center"></div>';

    p.appendChild(convPane);
  }

  function styleTab(el, active) {
    el.style.cssText = 'flex:1;padding:10px 6px;text-align:center;font-size:.7rem;font-weight:600;letter-spacing:.06em;text-transform:uppercase;cursor:pointer;transition:all .14s;' +
      (active ? 'color:var(--accent);border-bottom:2px solid var(--accent)' : 'color:var(--text-light);border-bottom:2px solid transparent');
  }

  function switchTab(tab) {
    activeTab = tab;
    var c = document.getElementById('cPaneCalc');
    var v = document.getElementById('cPaneConv');
    var tc = document.getElementById('cTabCalc');
    var tv = document.getElementById('cTabConv');
    if(c) c.style.display = tab==='calc' ? 'block' : 'none';
    if(v) v.style.display = tab==='conv' ? 'block' : 'none';
    if(tc) styleTab(tc, tab==='calc');
    if(tv) styleTab(tv, tab==='conv');
    if(tab==='conv') fetchRate();
  }
  window.switchTab = switchTab;

  // Calc functions
  function updateDisplay() {
    var r = document.getElementById('cRes');
    if(r) r.textContent = expr.length > 16 ? expr.slice(-16) : expr;
  }
  function doDigit(d) {
    if(hasResult) { expr = (d==='.' ? '0' : '') + d; hasResult = false; }
    else if(expr==='0' && d!=='.') expr = d;
    else expr += d;
    updateDisplay();
  }
  function doOp(op) {
    hasResult = false;
    var last = expr.slice(-1);
    if('÷×−+'.indexOf(last) !== -1) expr = expr.slice(0,-1) + op;
    else expr += op;
    updateDisplay();
  }
  function doEqual() {
    try {
      var e2 = expr.split('÷').join('/').split('×').join('*').split('−').join('-');
      var res = Function('"use strict";return (' + e2 + ')')();
      var exEl = document.getElementById('cExpr');
      if(exEl) exEl.textContent = expr + ' =';
      expr = String(parseFloat(res.toFixed(10)));
      hasResult = true;
      updateDisplay();
    } catch(err) { expr = 'Error'; updateDisplay(); }
  }
  function doClear() {
    expr = '0'; hasResult = false;
    var exEl = document.getElementById('cExpr');
    if(exEl) exEl.textContent = '';
    updateDisplay();
  }
  function doBack() {
    if(hasResult){ doClear(); return; }
    expr = expr.slice(0,-1) || '0';
    updateDisplay();
  }

  // Keyboard
  document.addEventListener('keydown', function(e) {
    var p = document.getElementById('calcPanel');
    if(!p || p.style.display==='none') return;
    if(activeTab !== 'calc') return;
    if('0123456789.'.indexOf(e.key) !== -1) doDigit(e.key);
    else if(e.key==='+') doOp('+');
    else if(e.key==='-') doOp('−');
    else if(e.key==='*') doOp('×');
    else if(e.key==='/') { e.preventDefault(); doOp('÷'); }
    else if(e.key==='Enter'||e.key==='=') doEqual();
    else if(e.key==='Backspace') doBack();
    else if(e.key==='Escape') toggleCalc();
  });

  // Currency
  async function fetchRate() {
    if(phpRate) { updateRateDisplay(); return; }
    try {
      var r = await fetch('https://api.exchangerate-api.com/v4/latest/USD');
      var data = await r.json();
      if(data.rates && data.rates.PHP) {
        phpRate = 1 / data.rates.PHP;
        updateRateDisplay(data.date);
      }
    } catch(ex) {
      phpRate = 1/56.5;
      var rl = document.getElementById('cRateLabel');
      if(rl) rl.textContent = '≈ ₱1 = $' + phpRate.toFixed(5) + ' (approx)';
      var ci = document.getElementById('cConvInfo');
      if(ci) ci.textContent = 'Live rate unavailable — using approximate rate';
    }
  }
  function updateRateDisplay(date) {
    var rl = document.getElementById('cRateLabel');
    if(rl) rl.textContent = '₱1 = $' + phpRate.toFixed(6) + (date?' · updated '+date:'');
    var ci = document.getElementById('cConvInfo');
    if(ci) ci.textContent = 'Source: ExchangeRate-API';
  }
  window._convFromPhp = function() {
    if(!phpRate) return;
    var v = parseFloat(document.getElementById('cPhp').value)||0;
    var u = document.getElementById('cUsd');
    if(u) u.value = v > 0 ? (v*phpRate).toFixed(2) : '';
  };
  window._convFromUsd = function() {
    if(!phpRate) return;
    var v = parseFloat(document.getElementById('cUsd').value)||0;
    var ph = document.getElementById('cPhp');
    if(ph) ph.value = v > 0 ? (v/phpRate).toFixed(2) : '';
  };

  // Hover effect on bubble
  var bub = document.getElementById('calcBubble');
  if(bub) {
    bub.onmouseover = function(){ if(document.getElementById('calcPanel').style.display==='none') this.style.background='rgba(255,255,255,0.9)'; };
    bub.onmouseout  = function(){ if(document.getElementById('calcPanel').style.display==='none') this.style.background='rgba(255,255,255,0.72)'; };
  }
})();
</script>
</body>
</html>
