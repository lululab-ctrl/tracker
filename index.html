<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Lulu</title>
<link href="https://fonts.googleapis.com/css2?family=DM+Serif+Display:ital@0;1&family=DM+Sans:wght@300;400;500;600&family=DM+Serif+Text:ital@0;1&display=swap" rel="stylesheet">
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{
  /* ── Muted Wildflower: dusty rose, dried lavender, sage, warm linen ── */
  --bg:#F5EEE8;--surface:#FDFAF7;--surface2:#EEE4DA;--surface3:#E4D6C8;
  --border:#D8C8B8;--border-light:#E8DAC8;

  --text:#2A1E18;--text-mid:#6A4E40;--text-light:#A88870;

  /* Primary: dusty rose — muted, feminine, not bright */
  --accent:#B85870;--accent-hover:#9A4058;
  --accent-bg:rgba(184,88,112,.08);--accent-light:#F8ECF0;

  /* Secondary: muted peach-blush */
  --terra:#C8806A;--terra-bg:rgba(200,128,106,.1);

  /* Sidebar: deep sage-olive — earthy wildflower field */
  --sidebar-bg:#3C4A34;--sidebar-border:rgba(255,255,255,.09);
  --sidebar-text:rgba(255,255,255,.7);--sidebar-active:rgba(210,200,160,.15);

  /* Semantic — all muted, earthy-floral */
  --green:#6A9050;--green-bg:rgba(106,144,80,.12);
  --red:#B85858;--red-bg:rgba(184,88,88,.12);
  --blue:#6878A8;--blue-bg:rgba(104,120,168,.12);
  --purple:#8868A8;--purple-bg:rgba(136,104,168,.12);
  --amber:#B8903A;--amber-bg:rgba(184,144,58,.12);

  --shadow-sm:0 1px 4px rgba(60,40,20,.08),0 1px 2px rgba(60,40,20,.05);
  --shadow-md:0 4px 20px rgba(60,40,20,.12),0 2px 8px rgba(60,40,20,.06);
  --shadow-lg:0 24px 64px rgba(60,40,20,.14),0 8px 24px rgba(60,40,20,.08);

  --radius:12px;--radius-sm:8px;--radius-lg:16px;
  --sidebar-w:252px;--topbar-h:60px;
  --font-display:'DM Serif Display',Georgia,serif;
  --font-body:'DM Sans',-apple-system,sans-serif;
}
html,body{height:100%;overflow:hidden;font-family:var(--font-body);font-weight:400;color:var(--text);background:var(--bg);-webkit-font-smoothing:antialiased}
.app{display:flex;height:100vh;overflow:hidden}
.sidebar{width:var(--sidebar-w);min-width:var(--sidebar-w);background:var(--sidebar-bg);display:flex;flex-direction:column;overflow:hidden;transition:width .26s cubic-bezier(.4,0,.2,1);z-index:50;flex-shrink:0}
.sidebar.collapsed{width:56px;min-width:56px}
.main{flex:1;display:flex;flex-direction:column;overflow:hidden;min-width:0}
.topbar{height:var(--topbar-h);min-height:var(--topbar-h);background:#FDFAF7;border-bottom:1px solid var(--border);display:flex;align-items:center;padding:0 22px;gap:12px}
.content{flex:1;overflow-y:auto;padding:26px 28px;background:var(--bg)}
.sb-logo{padding:20px 16px 16px;border-bottom:1px solid var(--sidebar-border);display:flex;align-items:center;gap:11px;cursor:pointer;flex-shrink:0;user-select:none}
.sb-logo-mark{width:28px;height:28px;background:linear-gradient(135deg,#B85870,#D4907A);border-radius:8px;display:flex;align-items:center;justify-content:center;font-size:.75rem;color:#fff;font-weight:600;flex-shrink:0;letter-spacing:.04em;box-shadow:0 2px 8px rgba(184,88,112,.22)}
.sb-logo-text{font-family:var(--font-display);font-size:1.1rem;font-weight:400;color:rgba(255,255,255,.88);white-space:nowrap;transition:opacity .2s;letter-spacing:.02em}
.sidebar.collapsed .sb-logo-text{opacity:0;width:0;overflow:hidden}
.sb-nav{flex:1;overflow-y:auto;overflow-x:hidden;padding:10px 0}
.sb-nav::-webkit-scrollbar{width:3px}.sb-nav::-webkit-scrollbar-thumb{background:rgba(255,255,255,.08);border-radius:2px}
.sb-section{font-size:.6rem;letter-spacing:.22em;text-transform:uppercase;color:rgba(255,255,255,.2);padding:14px 16px 5px;white-space:nowrap;transition:opacity .2s;font-weight:500}
.sidebar.collapsed .sb-section{opacity:0}
.sb-item{display:flex;align-items:center;gap:10px;padding:8px 14px;margin:1px 8px;border-radius:var(--radius-sm);cursor:pointer;transition:background .16s;white-space:nowrap;position:relative}
.sb-item:hover{background:rgba(255,255,255,.06)}
.sb-item.active{background:var(--sidebar-active)}
.sb-item.active::before{content:'';position:absolute;left:-8px;top:50%;transform:translateY(-50%);width:3px;height:60%;background:#D4B080;border-radius:0 2px 2px 0}
.sb-icon{font-size:.85rem;min-width:22px;text-align:center;flex-shrink:0;opacity:.55}
.sb-item.active .sb-icon,.sb-item:hover .sb-icon{opacity:1}
.sb-label{font-size:.78rem;font-weight:400;color:var(--sidebar-text);transition:opacity .2s;overflow:hidden}
.sidebar.collapsed .sb-label{opacity:0;width:0}
.sb-item.active .sb-label{color:rgba(255,255,255,.9);font-weight:500}
.sb-bottom{padding:8px 0;border-top:1px solid var(--sidebar-border);flex-shrink:0}
.sb-badge{position:absolute;right:10px;background:var(--accent);color:#fff;font-size:.54rem;padding:1px 6px;border-radius:10px;font-weight:600}
.tb-left{display:flex;align-items:center;gap:10px;flex:1;min-width:0}
.tb-title{font-family:var(--font-display);font-size:1.08rem;font-weight:400;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;color:var(--text)}
.tb-bread{font-size:.67rem;color:var(--text-light);letter-spacing:.04em;white-space:nowrap;margin-top:1px}
.tb-right{display:flex;align-items:center;gap:8px;flex-shrink:0}
.search-wrap{position:relative;display:flex;align-items:center}
.search-wrap input{border:1px solid var(--border);border-radius:20px;padding:6px 14px 6px 32px;font-family:var(--font-body);font-size:.75rem;color:var(--text);background:var(--surface2);outline:none;width:170px;transition:width .22s,border-color .18s,background .18s}
.search-wrap input:focus{width:220px;border-color:var(--accent);background:var(--surface)}
.search-wrap .si{position:absolute;left:11px;font-size:.8rem;color:var(--text-light);pointer-events:none}
.hamburger{background:none;border:none;font-size:1.1rem;cursor:pointer;color:var(--text-mid);display:none;padding:4px}
.btn{display:inline-flex;align-items:center;gap:5px;padding:8px 16px;border:none;border-radius:20px;font-family:var(--font-body);font-size:.73rem;font-weight:500;cursor:pointer;transition:all .16s;white-space:nowrap}
.btn-primary{background:var(--accent);color:#fff;box-shadow:0 2px 8px rgba(184,88,112,.22)}.btn-primary:hover{background:var(--accent-hover);box-shadow:0 3px 12px rgba(184,88,112,.32);transform:translateY(-1px)}
.btn-ghost{background:var(--surface);color:var(--text);border:1.5px solid var(--border);font-weight:500}.btn-ghost:hover{border-color:var(--accent);color:var(--accent);background:var(--accent-bg)}
.btn-danger{background:#B85858;color:#FFFFFF;border:none;font-weight:500}.btn-danger:hover{background:#9A3A3A}
.btn-sm{padding:5px 11px;font-size:.69rem}
.btn-dark{background:var(--sidebar-bg);color:rgba(255,255,255,.8)}.btn-dark:hover{background:#4E5E40}
.card{background:var(--surface);border:1px solid var(--border-light);border-radius:var(--radius);padding:18px;transition:box-shadow .18s,transform .18s;box-shadow:var(--shadow-sm)}
.card:hover{box-shadow:var(--shadow-md);transform:translateY(-1px)}
.card-sm{padding:14px 16px}
.card-flat{box-shadow:none}.card-flat:hover{box-shadow:var(--shadow-sm);transform:none}
.grid-4{display:grid;grid-template-columns:repeat(4,1fr);gap:14px}
.grid-3{display:grid;grid-template-columns:repeat(3,1fr);gap:14px}
.grid-2{display:grid;grid-template-columns:repeat(2,1fr);gap:14px}
.stat-label{font-size:.62rem;letter-spacing:.16em;text-transform:uppercase;color:var(--text-light);margin-bottom:5px;font-weight:500}
.stat-val{font-family:var(--font-display);font-size:2rem;line-height:1;color:var(--text)}
.stat-sub{font-size:.7rem;color:var(--text-light);margin-top:4px}
.tbl-wrap{background:var(--surface);border:1px solid var(--border-light);border-radius:var(--radius);overflow:hidden;margin-bottom:20px;box-shadow:var(--shadow-sm)}
table{width:100%;border-collapse:collapse}
th{font-size:.62rem;letter-spacing:.16em;text-transform:uppercase;color:var(--text-mid);padding:10px 16px;text-align:left;background:var(--surface2);border-bottom:1px solid var(--border);font-weight:600}
td{font-size:.81rem;padding:11px 16px;border-bottom:1px solid var(--border-light);color:var(--text);vertical-align:middle;font-weight:400}
tr:last-child td{border-bottom:none}
tr:hover td{background:var(--surface2)}
.badge{display:inline-flex;align-items:center;font-size:.62rem;letter-spacing:.06em;text-transform:uppercase;padding:4px 10px;border-radius:20px;font-weight:700}
.b-green{background:#6A9050;color:#fff}
.b-amber{background:#B8903A;color:#fff}
.b-red{background:#B85858;color:#fff}
.b-blue{background:#6878A8;color:#fff}
.b-purple{background:#8868A8;color:#fff}
.b-gray{background:#8A7060;color:#fff;border:none}
.form-group{margin-bottom:14px}
.form-label{display:block;font-size:.68rem;letter-spacing:.1em;text-transform:uppercase;color:var(--text-mid);margin-bottom:5px;font-weight:500}
.form-input,.form-select,.form-textarea{width:100%;border:1px solid var(--border);border-radius:var(--radius-sm);padding:9px 12px;font-family:var(--font-body);font-size:.82rem;color:var(--text);background:var(--surface);outline:none;transition:border-color .16s,box-shadow .16s}
.form-input:focus,.form-select:focus,.form-textarea:focus{border-color:var(--accent);box-shadow:0 0 0 3px var(--accent-bg)}
.form-textarea{resize:vertical;min-height:72px}
.fr2{display:grid;grid-template-columns:1fr 1fr;gap:14px}
.fr3{display:grid;grid-template-columns:1fr 1fr 1fr;gap:14px}
.overlay{position:fixed;inset:0;background:rgba(20,16,12,.5);z-index:200;display:none;align-items:center;justify-content:center;padding:20px;backdrop-filter:blur(4px);pointer-events:none}
.overlay.open{display:flex}
.overlay .modal{pointer-events:all}
.modal{background:var(--surface);border-radius:var(--radius-lg);width:100%;max-width:560px;max-height:90vh;overflow-y:auto;box-shadow:var(--shadow-lg);border:1px solid var(--border-light)}
.modal-lg{max-width:740px}
.modal-head{padding:20px 24px 16px;display:flex;align-items:center;justify-content:space-between;position:sticky;top:0;background:var(--surface);z-index:1;border-bottom:1px solid var(--border-light)}
.modal-title{font-family:var(--font-display);font-size:1.2rem;font-weight:400}
.modal-x{background:none;border:none;font-size:1rem;cursor:pointer;color:var(--text-light);padding:4px 8px;border-radius:6px;transition:background .15s}.modal-x:hover{background:var(--surface2);color:var(--text)}
.modal-body{padding:20px 24px}
.modal-foot{padding:14px 24px;border-top:1px solid var(--border-light);display:flex;justify-content:flex-end;gap:8px;position:sticky;bottom:0;background:var(--surface)}
.tabs{display:flex;border-bottom:1px solid var(--border);margin-bottom:20px;overflow-x:auto}
.tab{padding:9px 16px;font-size:.72rem;letter-spacing:.08em;text-transform:uppercase;cursor:pointer;color:var(--text-light);border-bottom:2px solid transparent;margin-bottom:-1px;transition:all .16s;white-space:nowrap;flex-shrink:0;font-weight:500}
.tab.active{color:var(--accent);border-bottom-color:var(--accent)}
.tab:hover{color:var(--text-mid)}
.tab-panel{display:none}.tab-panel.active{display:block}
.prog-bar{height:5px;background:var(--border);border-radius:3px;overflow:hidden}
.prog-fill{height:100%;background:linear-gradient(90deg,#B85870,#D4907A);border-radius:3px;transition:width .4s}
.acc-item{border:1px solid var(--border-light);border-radius:var(--radius);margin-bottom:8px;overflow:hidden;background:var(--surface);box-shadow:var(--shadow-sm)}
.acc-head{display:flex;align-items:center;padding:14px 18px;cursor:pointer;gap:12px;background:var(--surface);transition:background .16s;user-select:none}
.acc-head:hover,.acc-item.open .acc-head{background:var(--surface2)}
.acc-num{font-family:var(--font-display);font-size:1.5rem;color:var(--accent);line-height:1;min-width:36px}
.acc-meta{flex:1}
.acc-name{font-size:.82rem;font-weight:600;color:var(--text)}
.acc-sub{font-size:.71rem;color:var(--text-light);margin-top:2px}
.acc-chev{color:var(--text-light);transition:transform .26s;font-size:.85rem;flex-shrink:0}
.acc-item.open .acc-chev{transform:rotate(180deg);color:var(--accent)}
.acc-body{max-height:0;overflow:hidden;transition:max-height .42s cubic-bezier(.4,0,.2,1)}
.acc-inner{padding:16px 18px 20px}
.acc-overview{font-size:.8rem;color:var(--text-mid);line-height:1.8;margin-bottom:16px;padding:10px 14px;border-left:2px solid var(--accent);background:var(--accent-bg);border-radius:0 var(--radius-sm) var(--radius-sm) 0}
.ex-grid{display:flex;flex-direction:column;gap:10px}
.ex-card{display:grid;grid-template-columns:32px 1fr;gap:12px;padding:14px;background:var(--surface2);border-radius:var(--radius-sm);border:1px solid var(--border-light)}
.ex-idx{font-family:var(--font-display);font-size:1.3rem;color:var(--accent);line-height:1;text-align:center}
.ex-name{font-size:.8rem;font-weight:600;margin-bottom:2px}
.ex-sets{font-size:.66rem;letter-spacing:.1em;color:var(--accent);text-transform:uppercase;margin-bottom:5px;font-weight:500}
.ex-desc{font-size:.77rem;color:var(--text-mid);line-height:1.7;margin-bottom:7px}
.ex-tip{font-size:.72rem;color:var(--accent-hover);background:var(--accent-bg);padding:7px 10px;border-radius:var(--radius-sm);border-left:2px solid var(--accent)}
.ex-tip::before{content:"✦ ";font-weight:600}
.day-fin{margin-top:14px;padding:12px 16px;background:#3C4A34;border-radius:var(--radius-sm);color:rgba(255,255,255,.65);font-size:.77rem;line-height:1.75}
.day-fin strong{color:#D4A878;font-weight:500}
.upload-zone{border:1.5px dashed var(--border);border-radius:var(--radius);padding:24px;text-align:center;cursor:pointer;transition:all .16s;background:var(--surface2)}
.upload-zone:hover{border-color:var(--accent);background:var(--accent-bg)}
.upload-zone p{font-size:.76rem;color:var(--text-light);margin-top:6px}
.photo-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(110px,1fr));gap:8px}
.photo-item{position:relative;aspect-ratio:1;border-radius:var(--radius-sm);overflow:hidden;background:var(--surface3)}
.photo-item img{width:100%;height:100%;object-fit:cover;display:block}
.photo-del{position:absolute;top:4px;right:4px;background:rgba(0,0,0,.55);color:#fff;border:none;border-radius:50%;width:20px;height:20px;font-size:.6rem;cursor:pointer;display:none;align-items:center;justify-content:center}
.photo-item:hover .photo-del{display:flex}
.dest-card{background:var(--surface);border:1px solid var(--border-light);border-radius:var(--radius-lg);overflow:hidden;cursor:pointer;transition:box-shadow .2s,transform .2s;box-shadow:var(--shadow-sm)}
.dest-card:hover{box-shadow:var(--shadow-md);transform:translateY(-3px)}
.dest-cover{height:138px;background:linear-gradient(135deg,#3C4A34,#5A6848);display:flex;align-items:center;justify-content:center;position:relative;overflow:hidden}
.dest-cover img{width:100%;height:100%;object-fit:cover;display:block}
.dest-cover-placeholder{font-size:2.6rem;opacity:.22}
.dest-cover-overlay{position:absolute;inset:0;background:linear-gradient(to top,rgba(0,0,0,.42) 0%,transparent 60%)}
.dest-cover-flag{position:absolute;top:10px;right:12px;font-size:1.4rem;filter:drop-shadow(0 1px 3px rgba(0,0,0,.4))}
.dest-body{padding:14px 16px}
.dest-name{font-family:var(--font-display);font-size:1.18rem;margin-bottom:3px;color:var(--text)}
.dest-meta{font-size:.7rem;color:var(--text-light);margin-bottom:10px}
.dest-chips{display:flex;gap:5px;flex-wrap:wrap}
.chip{font-size:.61rem;letter-spacing:.06em;text-transform:uppercase;padding:3px 9px;border-radius:20px;border:1px solid var(--border);color:var(--text-mid);background:var(--surface2);font-weight:500}
.prog-card{background:var(--surface);border:1px solid var(--border-light);border-radius:var(--radius);padding:18px;position:relative;overflow:hidden;box-shadow:var(--shadow-sm);transition:box-shadow .18s,transform .18s}
.prog-card:hover{box-shadow:var(--shadow-md);transform:translateY(-2px)}
.prog-card-accent{position:absolute;top:0;left:0;bottom:0;width:4px;border-radius:var(--radius) 0 0 var(--radius)}
.prog-card-body{padding-left:14px}
.sec-head{display:flex;align-items:center;justify-content:space-between;margin-bottom:16px;flex-wrap:wrap;gap:8px}
.sec-title{font-family:var(--font-display);font-size:1.3rem;font-weight:400;color:var(--text)}
.sec-actions{display:flex;gap:8px;align-items:center}
.back-btn{display:inline-flex;align-items:center;gap:5px;font-size:.72rem;letter-spacing:.06em;text-transform:uppercase;color:var(--text-light);cursor:pointer;border:none;background:none;padding:0;transition:color .16s;margin-bottom:16px;font-weight:500}
.back-btn:hover{color:var(--accent)}
.empty{text-align:center;padding:48px 24px;color:var(--text-light)}
.empty-icon{font-size:2.2rem;margin-bottom:10px;opacity:.3}
.empty p{font-size:.82rem;line-height:1.7;margin-bottom:16px}
.divider{border:none;border-top:1px solid var(--border);margin:18px 0}
.dest-hero{background:linear-gradient(135deg,#3C4A34 0%,#5A6848 100%);border-radius:var(--radius-lg);padding:24px 28px;margin-bottom:22px;display:flex;align-items:center;justify-content:space-between;gap:16px;flex-wrap:wrap;position:relative;box-shadow:var(--shadow-md)}
.dest-hero::before{content:'';position:absolute;right:-60px;top:-60px;width:240px;height:240px;border-radius:50%;background:radial-gradient(circle,rgba(200,220,160,.15) 0%,transparent 70%);pointer-events:none;z-index:0}
.dest-hero-info{position:relative;z-index:1}
.dest-hero-flag{font-size:2.6rem;margin-bottom:6px}
.dest-hero-name{font-family:var(--font-display);font-size:1.9rem;color:#FFFFFF;line-height:1.1;font-weight:400}
.dest-hero-sub{font-size:.74rem;color:rgba(255,255,255,.72);margin-top:5px;letter-spacing:.04em}
.dest-hero-stats{display:flex;gap:24px;flex-wrap:wrap;position:relative;z-index:1}
.dest-hero-stat{text-align:center}
.dest-hero-stat-val{font-family:var(--font-display);font-size:1.6rem;color:#FEF0F3}
.dest-hero-stat-label{font-size:.6rem;letter-spacing:.15em;text-transform:uppercase;color:rgba(255,255,255,.7);margin-top:2px;font-weight:500}
.pack-item{display:flex;align-items:center;gap:9px;padding:6px 0;border-bottom:1px solid var(--border-light)}
.pack-item:last-child{border-bottom:none}
.pack-item input[type=checkbox]{accent-color:var(--accent);width:14px;height:14px;flex-shrink:0}
.pack-item-name{font-size:.8rem;flex:1;color:var(--text)}
.pack-item-name.done{text-decoration:line-through;color:var(--text-light)}
.itin-day-tabs{display:flex;gap:6px;flex-wrap:wrap;margin-bottom:20px}
.itin-day-tab{padding:6px 14px;font-size:.69rem;font-weight:500;letter-spacing:.06em;text-transform:uppercase;border:1px solid var(--border);border-radius:20px;cursor:pointer;color:var(--text-mid);background:var(--surface);transition:all .16s;white-space:nowrap;box-shadow:var(--shadow-sm)}
.itin-day-tab.active{background:var(--accent);color:#fff;border-color:var(--accent);box-shadow:0 2px 8px rgba(184,88,112,.22)}
.itin-day-tab:hover:not(.active){border-color:var(--accent);color:var(--accent);background:var(--accent-bg)}
.timeline{position:relative;padding-left:76px}
.timeline::before{content:'';position:absolute;left:54px;top:8px;bottom:8px;width:1px;background:var(--border)}
.tl-row{position:relative;display:flex;gap:14px;margin-bottom:6px;align-items:flex-start;min-height:52px}
.tl-time{position:absolute;left:-76px;width:58px;text-align:right;font-size:.68rem;font-weight:500;color:var(--text-light);padding-top:16px;white-space:nowrap}
.tl-dot{position:absolute;left:-21px;width:9px;height:9px;border-radius:50%;background:var(--border);border:2px solid var(--bg);top:18px;z-index:1;transition:background .16s,transform .16s}
.tl-row.has-entry .tl-dot{background:var(--accent);transform:scale(1.2)}
.tl-card{flex:1;background:var(--surface);border:1px solid var(--border-light);border-radius:var(--radius);padding:11px 14px;cursor:pointer;transition:border-color .16s,box-shadow .16s;display:flex;align-items:flex-start;gap:10px;box-shadow:var(--shadow-sm)}
.tl-card:hover{border-color:var(--accent);box-shadow:0 3px 12px rgba(60,40,20,.1)}
.tl-card.filled{border-left:3px solid var(--accent)}
.tl-card.empty{border-style:dashed;background:transparent;box-shadow:none}
.tl-card.empty:hover{background:var(--accent-bg);border-style:solid}
.tl-card.empty .tl-add-hint{font-size:.72rem;color:var(--text-light);font-style:italic}
.tl-entry-type{font-size:.59rem;letter-spacing:.1em;text-transform:uppercase;padding:3px 8px;border-radius:20px;white-space:nowrap;flex-shrink:0;font-weight:600}
.tl-entry-title{font-size:.8rem;font-weight:600;flex:1;color:var(--text)}
.tl-entry-time-range{font-size:.65rem;color:var(--text-light);white-space:nowrap}
.tl-entry-detail{font-size:.72rem;color:var(--text-mid);margin-top:3px;line-height:1.5}

<script>
// ══════════════════════════════════════════════
// HELPERS (must be defined before DB init)
// ══════════════════════════════════════════════
// Instantly hide splash if active session exists (prevents flash on refresh)
(function(){
  try {
    const ts = parseInt(sessionStorage.getItem('lulu_last')||'0');
    const pg = sessionStorage.getItem('lulu_page');
    // Only hide if BOTH are set and within 5 min — i.e. it's a refresh, not a fresh open
    if(ts && pg && (Date.now() - ts) < 5 * 60 * 1000) {
      const s = document.getElementById('splash');
      if(s) s.style.display = 'none';
    }
  } catch(e){}
})();
function uid() { return Date.now().toString(36)+Math.random().toString(36).slice(2,6); }
function td() { return new Date().toISOString().slice(0,10); }
function fv(id) { const e=document.getElementById(id); return e?e.value.trim():''; }
function qs(sel) { return document.querySelector(sel); }

// Ensures all expected arrays exist — fixes errors when loading older saved data
function migrateDB(db) {
  const defaults = {
    destinations:[],bookings:[],expenses:[],packingLists:[],
    memories:[],documents:[],itineraries:[],programs:[],
    workoutLogs:[],goals:[],nutrition:[],calEvents:[],budgetIncome:[],budgetLoans:[],budgetBills:[],budgetVarExp:[],budgetSavings:[]
  };
  Object.keys(defaults).forEach(k=>{ if(!Array.isArray(db[k])) db[k]=defaults[k]; });
  if(!db.budgetCarryover) db.budgetCarryover = {};
  // Sync paid/paidBy from bookings to their linked expenses
  if(db.bookings && db.expenses) {
    db.bookings.forEach(b=>{
      if(b._expId) {
        const exp = db.expenses.find(x=>x.id===b._expId);
        if(exp) { exp.paid = b.paid||false; exp.paidBy = b.paidBy||'Me'; }
      }
    });
  }
  // Auto-reset recurring bills to Unpaid on the 1st of each new month
  // and store the carryover balance before resetting
  if(db.budgetBills && Array.isArray(db.budgetBills)) {
    const now = new Date();
    const curYM = now.getFullYear()+'-'+String(now.getMonth()+1).padStart(2,'0');
    const lastReset = db._lastRecurReset;
    if(lastReset && lastReset !== curYM) {
      // Compute net of the month that just ended (lastReset month)
      const inc = (db.budgetIncome||[]).reduce((s,i)=>s+parseFloat(i.amount||0),0);
      const rec = db.budgetBills.reduce((s,b)=>s+parseFloat(b.amount||0),0);
      const varExp = (db.budgetVarExp||[]).filter(e=>(e.date||'').slice(0,7)===lastReset)
                       .reduce((s,e)=>s+parseFloat(e.amount||0),0);
      const prevCarry = (db.budgetCarryover||{})[lastReset] || 0;
      const netLast = inc + prevCarry - rec - varExp;
      // Store as carryover for current month
      if(!db.budgetCarryover) db.budgetCarryover = {};
      db.budgetCarryover[curYM] = netLast;
      // Reset recurring bills
      db.budgetBills.forEach(b=>{ b.paid = false; });
    } else if(!lastReset) {
      // First time — just reset without computing carryover
      db.budgetBills.forEach(b=>{ b.paid = false; });
    }
    db._lastRecurReset = curYM;
  }
  return db;
}

// ══════════════════════════════════════════════
// CLOUD STORAGE — Supabase
// ══════════════════════════════════════════════
// SETUP:
// 1. Create free project at supabase.com
// 2. Run in SQL Editor:
//    create table lulu_data (
//      id text primary key default 'main',
//      data jsonb not null default '{}'::jsonb,

function go(page, navEl, pushStack=true) {
  if(pushStack && currentPage !== page) pageStack.push(currentPage);
  currentPage = page;
  // Persist current page/context for refresh restore (but do NOT touch lulu_last here)
  try {
    sessionStorage.setItem('lulu_page', page);
    if(page==='destination_detail') sessionStorage.setItem('lulu_destId', currentDestId||'');
    if(page==='program_detail') sessionStorage.setItem('lulu_progId', currentProgId||'');
    sessionStorage.setItem('lulu_destTab', currentDestTab||0);
  } catch(e){}
  document.querySelectorAll('.sb-item').forEach(i=>i.classList.remove('active'));
  const navMap = {dashboard:'nav_dashboard',calendar:'nav_calendar',destinations:'nav_destinations',destination_detail:'nav_destinations',programs:'nav_programs',program_detail:'nav_programs',log:'nav_log',nutrition:'nav_nutrition',budget:'nav_budget'};
  const target = document.getElementById(navMap[page]);
  if(target) target.classList.add('active');
  const meta = PAGE_META[page]||{title:page,bread:'Lulu'};
  let title = meta.title;
  let bread = meta.bread;
  if(page==='destination_detail' && currentDestId) {
    const d = DB.destinations.find(x=>x.id===currentDestId);
    if(d){ title=(d.flag||'')+(d.name||''); bread='Travel → '+d.name; }
  }
  if(page==='program_detail' && currentProgId) {
    const p = DB.programs.find(x=>x.id===currentProgId);
    if(p){ title=p.name; bread='Fitness → Programs → '+p.name; }
  }
  document.getElementById('tbTitle').textContent = title;
  document.getElementById('tbBread').textContent = bread;
  // Show back button when not on root pages
  const rootPages = ['dashboard','calendar','destinations','programs','log','nutrition','budget'];
  const backBtn = document.getElementById('tbBackBtn');
  if(backBtn) backBtn.style.display = (pageStack.length > 0 && !rootPages.includes(page)) ? 'flex' : 'none';
  // Hide + Add button on detail pages where it's not needed
  const addBtn = document.getElementById('addBtn');
  if(addBtn) addBtn.style.display = ['destination_detail','program_detail','dashboard','budget'].includes(page) ? 'none' : '';
  const searchWrap = document.querySelector('.search-wrap');
  if(searchWrap) searchWrap.style.display = page === 'budget' ? 'none' : '';

  updateBadges();
  render(page);
  document.getElementById('sidebar').classList.remove('mobile-open');
}

  DB.bookings.forEach(b=>{ if((b.name+(b.notes||'')).toLowerCase().includes(lq)){ const d=DB.destinations.find(x=>x.id===b.destId); results.push({type:'Booking',label:b.name,sub:d?d.name:'',action:`openDest('${b.destId}')`}); }});

  DB.memories.forEach(m=>{ if((m.title+(m.notes||'')).toLowerCase().includes(lq)){ const d=DB.destinations.find(x=>x.id===m.destId); results.push({type:'Memory',label:m.title,sub:d?d.name:'',action:`openDest('${m.destId}')`}); }});
  DB.programs.forEach(p=>{ if((p.name+(p.description||'')).toLowerCase().includes(lq)) results.push({type:'Program',label:p.name,sub:p.type||'',action:`openProg('${p.id}')`}); });

    results.map(r=>`<tr><td><span class="badge b-gray">${r.type}</span></td><td>${r.label}</td><td style="color:var(--text-light)">${r.sub}</td><td><button class="btn btn-ghost btn-sm" onclick="${r.action}">Open</button></td></tr>`).join('')+`</tbody></table>`;

let calY, calM;
function renderCalendar(c) {
  const now=new Date(); if(!calY){calY=now.getFullYear();calM=now.getMonth();}
  const fd=new Date(calY,calM,1).getDay(), dim=new Date(calY,calM+1,0).getDate();
  const mn=new Date(calY,calM,1).toLocaleString('default',{month:'long'});
  const todStr=td();

  // Type config: emoji, bg color
  const TYPE_CFG = {
    travel:      {emoji:'✈',  bg:'#6878A8'},
    fitness:     {emoji:'💪', bg:'#6A9050'},
    birthday:    {emoji:'🎂', bg:'#B85870', repeat:true},
    anniversary: {emoji:'💝', bg:'#8868A8', repeat:true},
    appointment: {emoji:'📋', bg:'#B8903A'},
    other:       {emoji:'◈',  bg:'#8A7060'},
  };

  const evMap={};
  const addEv=(date,title,type)=>{
    if(!date) return;
    const cfg = TYPE_CFG[type]||TYPE_CFG.other;
    // For yearly repeating events, match month-day regardless of year
    if(cfg.repeat) {
      const md = date.slice(5); // MM-DD
      const calMD = `${String(calM+1).padStart(2,'0')}-`;
      // check if this event's month falls in current calendar month
      if(!md.startsWith(calMD.slice(0,3))) return;
      const calDate = `${calY}-${md}`;
      if(!evMap[calDate]) evMap[calDate]=[];
      evMap[calDate].push({title, type, cfg, yearly:true});
    } else {
      if(!evMap[date]) evMap[date]=[];
      evMap[date].push({title, type, cfg});
    }
  };

  DB.calEvents.forEach(e=>{
    const cfg = TYPE_CFG[e.type]||TYPE_CFG.other;
    if(cfg.repeat) {
      const md = e.date.slice(5);
      const calDate = `${calY}-${md}`;
      if(!evMap[calDate]) evMap[calDate]=[];
      evMap[calDate].push({title:e.title, type:e.type, cfg, yearly:true});
    } else {
      addEv(e.date, e.title, e.type||'other');
    }
  });

  DB.destinations.forEach(d=>{
    if(!d.dates) return;

function renderTimeline(day, destId) {
  const el = document.getElementById('itinTimeline');
  if(!el) return;

  const startHour = 8;
  const endHour = 20;
  const entries = (day.entries||[]).slice().sort((a,b)=>a.time.localeCompare(b.time));
  const typeColors = {Transport:'type-transport',Accommodation:'type-accommodation',Food:'type-food',Activity:'type-activity',Rest:'type-rest',Other:'type-other'};

  // Build hour slots 08:00 → 20:00
  const hours = [];
  for(let h = startHour; h <= endHour; h++) {
    hours.push(`${String(h).padStart(2,'0')}:00`);
  }

  // For each hour slot, determine if it's covered by an entry span
  // Returns: null (free) | {entry, isStart, spanHours} 
  function toMins(t){ const [h,m]=t.split(':').map(Number); return h*60+m; }

  const slotMap = {};
  hours.forEach(h => { slotMap[h] = null; });

  entries.forEach(e => {
    const startM = toMins(e.time);
    const endM   = e.endTime ? toMins(e.endTime) : startM + 60;
    const spanHours = Math.ceil((endM - startM) / 60) || 1;

    hours.forEach(h => {
      const hM = toMins(h);
      if(hM >= startM && hM < endM) {
        slotMap[h] = {
          entry: e,
          isStart: hM === startM,
          spanHours,
        };
      }
    });
  });

  // Render — skip continuation slots (render as part of the start slot's block)
  let html = '<div class="timeline">';
  let skipUntil = null;

  hours.forEach(timeStr => {
    // Skip hours that are covered by a previous span (not the start)
    if(skipUntil && timeStr <= skipUntil && timeStr !== skipUntil) return;
    skipUntil = null;

    const slot = slotMap[timeStr];

    if(slot && slot.isStart) {
      const e = slot.entry;
      const typeClass = typeColors[e.type] || 'type-other';
      const endM = e.endTime ? toMins(e.endTime) : toMins(e.time) + 60;
      const startM = toMins(e.time);
      const durationMins = endM - startM;
      // calculate pixel height: each hour = 56px (min-height of tl-row)
      const blockH = Math.max(52, (durationMins / 60) * 56);

      // mark continuation hours to skip
      if(e.endTime) {
        hours.forEach(h => {
          const hM = toMins(h);
          if(hM > startM && hM < endM) skipUntil = h;
        });
      }

      html += `<div class="tl-row has-entry" style="min-height:${blockH}px;align-items:flex-start">
        <div class="tl-time">${formatTime(timeStr)}${e.endTime?'<br><span style="font-size:.58rem;color:var(--text-light)">to '+formatTime(e.endTime)+'</span>':''}</div>
        <div class="tl-dot" style="background:var(--accent);transform:scale(1.2)"></div>
        <div class="tl-card filled" style="min-height:${blockH - 6}px;border-left:3px solid var(--accent);background:var(--accent-light)">
          <div style="flex:1">
            <div style="display:flex;align-items:center;gap:8px;margin-bottom:${e.detail||e.note?'6px':'0'}">
              <span class="tl-entry-type ${typeClass}">${e.type}</span>
              <span class="tl-entry-title">${e.title}</span>
            </div>
            ${e.detail?`<div class="tl-entry-detail">${e.detail}</div>`:''}
            ${e.note?`<div class="tl-entry-note">${e.note}</div>`:''}
            ${durationMins>60?`<div style="font-size:.65rem;color:var(--accent);margin-top:4px;font-weight:500">${durationMins>=60?Math.floor(durationMins/60)+'h':''}${durationMins%60?` ${durationMins%60}m`:''}</div>`:''}
          </div>
          <button class="tl-entry-del" onclick="event.stopPropagation();editItinEntry('${day.id}','${e.id}','${destId}')">✏</button>
          <button class="tl-entry-del" onclick="event.stopPropagation();deleteItinEntry('${day.id}','${e.id}','${destId}')">✕</button>
        </div>
      </div>`;

    } else if(!slot) {
      // Free slot
      html += `<div class="tl-row">
        <div class="tl-time">${formatTime(timeStr)}</div>
        <div class="tl-dot"></div>
        <div class="tl-card empty" onclick="openAddItinEntryModal('${day.id}','${destId}','${timeStr}')">
          <span class="tl-add-hint">+ Add activity at ${formatTime(timeStr)}</span>
        </div>
      </div>`;
    }
    // covered continuation slots: silently skipped
  });

  html += '</div>';
  el.innerHTML = html;
}

function formatTime(t) {
  if(!t) return '';
  const [h,m] = t.split(':').map(Number);
  const ampm = h>=12?'PM':'AM';
  const h12 = h%12||12;
  return `${h12}:${String(m).padStart(2,'0')} ${ampm}`;
}

function formatTime12(t) { return formatTime(t); }

function openItinSetupModal(destId) {
  const dest = DB.destinations.find(x=>x.id===destId);
  openModal('Set Up Itinerary Days', `
    <p style="font-size:.78rem;color:var(--text-mid);margin-bottom:16px;line-height:1.7">Enter the start and end dates of your trip. The system will automatically create one day per date with a timeline from 6:00 AM to your chosen end time.</p>
    <div class="fr2">
      <div class="form-group"><label class="form-label">Trip Start Date</label><input class="form-input" id="f_isd" type="date" value="${dest.dates||td()}"></div>
      <div class="form-group"><label class="form-label">Trip End Date</label><input class="form-input" id="f_ied" type="date" value="${dest.endDate||''}"></div>
    </div>
    <div class="form-group"><label class="form-label">Daily End Time</label>
      <select class="form-select" id="f_iet">
        ${['20:00'].map(t=>`<option value="${t}" selected>${formatTime(t)}</option>`).join('')}
      </select>
      <div style="font-size:.7rem;color:var(--text-light);margin-top:4px">The timeline runs from 8:00 AM to 8:00 PM each day.</div>
    </div>
    <div style="background:var(--accent-light);border-radius:3px;padding:12px 14px;font-size:.76rem;color:var(--text-mid);margin-top:4px">
      ✦ Existing days will be kept. Only new dates will be added.
    </div>
  `, () => {
    const start = fv('f_isd');
    const end = fv('f_ied');
    const endTime = fv('f_iet');
    if(!start||!end){ alert('Please enter both start and end dates.'); return; }
    if(end < start){ alert('End date must be after start date.'); return; }

    // update dest endDate
    const d = DB.destinations.find(x=>x.id===destId);
    if(d) { d.endDate = end; d.dates = start; }

    // generate day entries for each date in range
    let cur = new Date(start+'T12:00:00');
    const endD = new Date(end+'T12:00:00');
    let added = 0;
    while(cur <= endD) {
      const dateStr = cur.toISOString().slice(0,10);
      const exists = DB.itineraries.find(x=>x.destId===destId && x.dayDate===dateStr);
      if(!exists) {
        DB.itineraries.push({id:uid(), destId, dayDate:dateStr, endTime, entries:[]});
        added++;
      }
      cur.setDate(cur.getDate()+1);
    }
    save();
    closeModal();
    currentItinDay = DB.itineraries.filter(x=>x.destId===destId).sort((a,b)=>a.dayDate.localeCompare(b.dayDate))[0]?.id || null;
    openDest(destId);
    if(added) setTimeout(()=>{ document.querySelectorAll('.tabs .tab')[0]?.click(); },50);
  });
}

function editItinEntry(dayId, entryId, destId) {
  const day = DB.itineraries.find(x=>x.id===dayId);
  const e = day?.entries?.find(x=>x.id===entryId);
  if(!e) return;
  const dt = new Date(day.dayDate+'T12:00:00');
  const dayLabel = dt.toLocaleDateString('en-US',{weekday:'long',month:'long',day:'numeric'});

  openModal(`Edit — ${dayLabel}`, `
    <div class="fr2">
      <div class="form-group"><label class="form-label">Start Time</label>
        <select class="form-select" id="f_et">${generateTimeOptions(day.endTime,'08:00',e.time)}</select>
      </div>
      <div class="form-group"><label class="form-label">End Time</label>

    </div>

      <select class="form-select" id="f_etp">
        ${['Activity','Food','Transport','Accommodation','Rest','Other'].map(t=>`<option${e.type===t?' selected':''}>${t}</option>`).join('')}

function deleteItinEntry(dayId, entryId, destId) {
  const day = DB.itineraries.find(x=>x.id===dayId);
  if(!day) return;
  day.entries = (day.entries||[]).filter(x=>x.id!==entryId);
  save(); openDest(destId, 0);
  setTimeout(()=>{ switchItinDay(dayId, destId); },50);
}

function generateTimeOptions(endTime, minTime, selected) {
  const [endH,endM] = '20:00'.split(':').map(Number);
  const [minH] = (minTime||'08:00').split(':').map(Number);
  let opts='';
  for(let h=8; h<=endH; h++) {
    if(h<minH) continue;
    const val=`${String(h).padStart(2,'0')}:00`;
    opts+=`<option value="${val}"${val===selected?' selected':''}>${formatTime(val)}</option>`;
  }
  return opts;
}

function fillDestBudget(exps, destId, payerFilter, paidFilter) {
  const st=document.getElementById('expStats'), tbl=document.getElementById('expTable');
  if(!st||!tbl) return;

  const typeToCategory = {Flight:'Flights',Accommodation:'Accommodation',Train:'Transport',Ferry:'Transport',Bus:'Transport',Tour:'Activities',Restaurant:'Food',Other:'Other'};

  // Merge bookings (with amounts) + manual expenses into one list
  const bookingEntries = DB.bookings
    .filter(b=>b.destId===destId && b.amount && parseFloat(b.amount)>0)
    .map(b=>({
      id:'bk_'+b.id, _isBooking:true, _bookingId:b.id,
      description:b.name + (b.splitPeople>1?` (÷${b.splitPeople})`:''),
      category: typeToCategory[b.type]||'Other',
      amount: parseFloat(b.amount),
      totalAmount: parseFloat(b.totalAmount||b.amount),
      splitPeople: b.splitPeople||1,
      paidBy: b.paidBy||'Me',
      paid: b.paid||false,
      date: b.date,
      type: b.type
    }));

  // Manual expenses (exclude any that were auto-created from bookings, to avoid double-counting)
  const manualExps = exps.filter(e=>!e._fromBooking);

  // Combine booking entries + manual expenses
  let allEntries = [...bookingEntries, ...manualExps];

  // Apply payer + paid filters to the full combined list
  if(payerFilter==='Me')          allEntries = allEntries.filter(e=>!e.paidBy || e.paidBy.trim()==='' || e.paidBy.trim()==='Me');
  else if(payerFilter==='others') allEntries = allEntries.filter(e=>e.paidBy && e.paidBy.trim()!=='' && e.paidBy.trim()!=='Me');
  if(paidFilter==='paid')         allEntries = allEntries.filter(e=>e.paid===true);
  else if(paidFilter==='unpaid')  allEntries = allEntries.filter(e=>!e.paid);

  // Sort chronologically: by date asc, then by time
  allEntries = allEntries.sort((a,b)=>{
    const dateCmp = (a.date||'').localeCompare(b.date||'');
    if(dateCmp!==0) return dateCmp;
    const aTime = a._bookingId ? (DB.bookings.find(x=>x.id===a._bookingId)||{}).checkInTime||'00:00' : '00:00';
    const bTime = b._bookingId ? (DB.bookings.find(x=>x.id===b._bookingId)||{}).checkInTime||'00:00' : '00:00';
    return aTime.localeCompare(bTime);
  });

  const total = allEntries.reduce((s,e)=>s+parseFloat(e.amount||0),0);
  const byCat = {};
  allEntries.forEach(e=>{ byCat[e.category]=(byCat[e.category]||0)+parseFloat(e.amount||0); });

  st.innerHTML=`<div style="display:flex;gap:10px;flex-wrap:wrap">
    <div class="card card-sm" style="flex:1;min-width:100px"><div class="stat-label">Total (My Share)</div><div class="stat-val" style="font-size:1.5rem">₱${total.toLocaleString('en',{minimumFractionDigits:2,maximumFractionDigits:2})}</div></div>
    ${Object.entries(byCat).map(([k,v])=>`<div class="card card-sm" style="flex:1;min-width:100px"><div class="stat-label">${k}</div><div class="stat-val" style="font-size:1.5rem">₱${v.toLocaleString('en',{minimumFractionDigits:2,maximumFractionDigits:2})}</div></div>`).join('')}
  </div>`;

  if(!allEntries.length){
    tbl.innerHTML=`<div class="empty"><div class="empty-icon">◎</div><p>No expenses yet.<br><span style="font-size:.75rem">Add bookings or manual expenses and they'll appear here.</span></p></div>`;
    return;
  }

  tbl.innerHTML=`<div class="tbl-wrap"><table>
    <thead><tr><th>Description</th><th>Category</th><th>Date</th><th>My Share</th><th>Total</th><th>Paid By</th><th>Status</th><th></th></tr></thead>
    <tbody>${allEntries.map(e=>`<tr style="${e.paid?'opacity:.7':''}">
      <td>
        <div style="font-weight:500;font-size:.8rem;${e.paid?'text-decoration:line-through;color:var(--text-light)':''}">${e.description}</div>
        ${e._isBooking?`<div style="font-size:.65rem;color:var(--text-light);margin-top:2px">From booking</div>`:''}
        ${!e._isBooking&&e.sharedWith?`<div style="font-size:.65rem;margin-top:2px"><span style="background:var(--purple-bg);color:var(--purple);padding:2px 6px;border-radius:8px">👥 ${e.sharedWith}</span></div>`:''}
      </td>
      <td><span class="badge b-amber">${e.category}</span></td>
      <td style="font-size:.72rem">${e.date||'—'}</td>
      <td style="font-weight:500;color:${e.paid?'var(--text-light)':'var(--accent)'}">₱${parseFloat(e.amount).toLocaleString('en',{minimumFractionDigits:2,maximumFractionDigits:2})}</td>
      <td style="font-size:.72rem;color:var(--text-light)">${e.splitPeople>1?'₱'+parseFloat(e.totalAmount||e.amount).toLocaleString('en',{minimumFractionDigits:2,maximumFractionDigits:2}):'—'}</td>
      <td style="font-size:.74rem;color:var(--text-mid)">${e.paidBy||'—'}</td>
      <td>${e.paid
        ? `<span style="font-size:.65rem;background:var(--green-bg);color:var(--green);padding:3px 8px;border-radius:10px;font-weight:600">✓ Paid</span>`
        : `<span style="font-size:.65rem;background:var(--red-bg);color:var(--red);padding:3px 8px;border-radius:10px;font-weight:600">Unpaid</span>`
      }</td>
      <td>${e._isBooking
        ? `<span style="font-size:.65rem;color:var(--text-light);font-style:italic">Edit in Bookings</span>`
        : `<div style="display:flex;gap:4px">
             <button class="btn btn-ghost btn-sm" onclick="openExpenseModal('${destId}','${e.id}')">Edit</button>
             <button class="btn btn-danger btn-sm" onclick="delItem('expenses','${e.id}',()=>openDest('${destId}',currentDestTab))">✕</button>
           </div>`
      }</td>
    </tr>`).join('')}</tbody>
  </table></div>`;
}

            style="width:54px;padding:7px 8px;font-size:.78rem;text-align:center">
          <button class="btn btn-primary btn-sm" onclick="addPackItem('${pl.id}','${destId}')">+ Add</button>

function removePackItemInline(idx, listId, destId) {
  const pl = DB.packingLists.find(l=>l.id===listId);
  if(!pl) return;
  pl.items.splice(idx,1);
  save();
  // re-open same modal
  closeModal();
  setTimeout(()=>editPackListModal(listId, destId), 50);
}

function fillDestDocs(docs, destId) {
  const el=document.getElementById('docContent'); if(!el) return;
  if(!docs.length){ el.innerHTML=`<div class="empty"><div class="empty-icon">📄</div><p>No documents yet.</p></div>`; return; }
  const wrap=document.createElement('div'); wrap.className='tbl-wrap';
  wrap.innerHTML=`<table><thead><tr><th>Title</th><th>Type</th><th>Notes</th><th></th></tr></thead>
    <tbody>${docs.map(doc=>`<tr>
      <td style="font-weight:500">${doc.title}</td>
      <td><span class="badge b-blue">${doc.type}</span></td>
      <td style="font-size:.72rem;color:var(--text-light)">${doc.notes||'—'}</td>
      <td><button class="btn btn-danger btn-sm" onclick="delItem('documents','${doc.id}',()=>openDest('${destId}',currentDestTab))">✕</button></td>
    </tr>`).join('')}</tbody></table>`;
  el.appendChild(wrap);
}

function fillDestMemories(mems, destId) {
  const el=document.getElementById('memContent'); if(!el) return;
  if(!mems.length){ el.innerHTML=`<div class="empty"><div class="empty-icon">❋</div><p>No memories yet.</p></div>`; return; }
  mems.forEach(m=>{
    const sec=document.createElement('div'); sec.style.marginBottom='24px';
    sec.innerHTML=`
      <div style="display:flex;justify-content:space-between;align-items:start;margin-bottom:10px">
        <div>
          <div style="font-family:var(--font-display);font-size:1.2rem">${m.title}</div>
          <div style="font-size:.7rem;color:var(--text-light)">${m.date||''}</div>
        </div>
        <button class="btn btn-danger btn-sm" onclick="delItem('memories','${m.id}',()=>openDest('${destId}',currentDestTab))">Delete</button>
      </div>
      ${m.notes?`<p style="font-size:.8rem;color:var(--text-mid);line-height:1.8;margin-bottom:10px">${m.notes}</p>`:''}
      ${m.photos&&m.photos.length?`<div class="photo-grid">${m.photos.map((p,pi)=>`
        <div class="photo-item"><img src="${p}" loading="lazy">
        <button class="photo-del" onclick="delPhoto('${m.id}',${pi},'${destId}')">✕</button></div>`).join('')}</div>`:''} `;
    el.appendChild(sec);
  });
}

function openDestModal(id) {
  const d=id?DB.destinations.find(x=>x.id===id)||{}:{};
  openModal(id?'Edit Destination':'Add Destination',`
    <div class="fr2">
      <div class="form-group"><label class="form-label">Destination Name</label><input class="form-input" id="f_dn" placeholder="e.g. Kuala Lumpur" value="${d.name||''}"></div>
      <div class="form-group"><label class="form-label">Country</label><input class="form-input" id="f_dc" placeholder="e.g. Malaysia" value="${d.country||''}"></div>
    </div>
    <div class="fr2">
      <div class="form-group"><label class="form-label">Flag Emoji</label><input class="form-input" id="f_df" placeholder="🇲🇾" value="${d.flag||''}"></div>
      <div class="form-group"><label class="form-label">Status</label><select class="form-select" id="f_ds">
        ${[['planned','Planning'],['ongoing','Ongoing'],['completed','Completed'],['cancelled','Cancelled']].map(([v,l])=>`<option value="${v}"${d.status===v?' selected':''}>${l}</option>`).join('')}

    </div>
    <div class="fr2">
      <div class="form-group"><label class="form-label">Travelers</label><input class="form-input" id="f_dtv" type="number" min="1" value="${d.travelers||1}"></div>
    </div>
    <div class="form-group"><label class="form-label">Itinerary & Notes</label><textarea class="form-textarea" id="f_dno" rows="5" placeholder="Day-by-day itinerary, tips, important info...">${d.notes||''}</textarea></div>
    <div class="form-group"><label class="form-label">Cover Photo</label>
      <div class="upload-zone" onclick="document.getElementById('f_dcover').click()" style="padding:14px">

      </div>
      <input type="file" id="f_dcover" accept="image/*" style="display:none" onchange="previewCover(this)">

    </div>
  `,()=>{
    const coverPrev=qs('#coverPrev img');

    if(id){const i=DB.destinations.findIndex(x=>x.id===id);DB.destinations[i]=obj;}

function previewCover(inp) {
  const r=new FileReader();
  r.onload=e=>{ document.getElementById('coverPrev').innerHTML=`<img src="${e.target.result}" style="width:100%;height:80px;object-fit:cover;border-radius:3px">`; };
  r.readAsDataURL(inp.files[0]);
}

function deleteDest(id) {
  openModal('Delete Destination', `
    <p style="font-size:.88rem;color:var(--text-mid);line-height:1.7">This will permanently delete this destination and <strong>all its data</strong> — bookings, expenses, packing lists, memories, and documents.</p>
    <p style="font-size:.82rem;color:var(--red);margin-top:10px;font-weight:500">This cannot be undone.</p>
  `, () => {
    DB.destinations=DB.destinations.filter(x=>x.id!==id);
    DB.bookings=DB.bookings.filter(x=>x.destId!==id);
    DB.expenses=DB.expenses.filter(x=>x.destId!==id);
    DB.packingLists=DB.packingLists.filter(x=>x.destId!==id);
    DB.memories=DB.memories.filter(x=>x.destId!==id);
    DB.documents=DB.documents.filter(x=>x.destId!==id);
    DB.itineraries=DB.itineraries.filter(x=>x.destId!==id);
    save(); closeModal(); go('destinations',null);
  }, false, 'Yes, Delete', true);
}

function openBookingModal(id, destId) {
  const b=id?DB.bookings.find(x=>x.id===id)||{}:{};
  const dId=b.destId||destId;
  const isAccomm = (b.type||'Flight')==='Accommodation';

  openModal(id?'Edit Booking':'Add Booking',`
    <div class="fr2">
      <div class="form-group"><label class="form-label">Name</label><input class="form-input" id="f_bn" placeholder="e.g. AirAsia KL→PEN" value="${b.name||''}"></div>
      <div class="form-group"><label class="form-label">Type</label>
        <select class="form-select" id="f_bt" onchange="updateBookingDateFields(this.value)">
          ${['Flight','Accommodation','Train','Ferry','Bus','Tour','Restaurant','Other'].map(t=>`<option${(b.type||'Flight')===t?' selected':''}>${t}</option>`).join('')}
        </select>
      </div>
    </div>

    <!-- HOTEL: check-in/out dates + times -->
    <div id="bk_accomm" style="display:${isAccomm?'block':'none'}">
      <div class="fr2">
        <div class="form-group"><label class="form-label">Check-in Date ✦</label><input class="form-input" id="f_bd" type="date" value="${b.date||''}"></div>

      </div>
      <div class="fr2">
        <div class="form-group"><label class="form-label">Check-in Time</label><input class="form-input" id="f_bckin" type="time" value="${b.checkInTime||'14:00'}"></div>
        <div class="form-group"><label class="form-label">Check-out Time</label><input class="form-input" id="f_bckout" type="time" value="${b.checkOutTime||'12:00'}"></div>
      </div>
    </div>

    <!-- OTHER: start date (mandatory) + end date + arrival/booking time -->
    <div id="bk_other" style="display:${isAccomm?'none':'block'}">
      <div class="fr2">
        <div class="form-group"><label class="form-label">Start Date ✦</label><input class="form-input" id="f_bd2" type="date" value="${b.date||''}"></div>
        <div class="form-group"><label class="form-label">End Date ✦</label><input class="form-input" id="f_bdend2" type="date" value="${b.dateEnd||''}"></div>
      </div>
      <div class="form-group"><label class="form-label" id="f_btime_label">Arrival / Departure Time</label>
        <input class="form-input" id="f_btime" type="time" value="${b.bookingTime||''}">
        <div style="font-size:.68rem;color:var(--text-light);margin-top:4px">e.g. required arrival time at the bus station, flight departure, tour meeting time</div>
      </div>
    </div>

    <div class="form-group"><label class="form-label">Confirmation No.</label><input class="form-input" id="f_bc" placeholder="ABC123" value="${b.confirmation||''}"></div>
    <div style="background:var(--surface2);border-radius:var(--radius-sm);padding:14px;margin-bottom:14px">
      <div style="font-size:.68rem;letter-spacing:.1em;text-transform:uppercase;color:var(--text-mid);font-weight:500;margin-bottom:10px">Cost Splitting</div>
      <div class="fr2" style="margin-bottom:0">
        <div class="form-group" style="margin-bottom:0">
          <label class="form-label">Total Amount (₱)</label>
          <input class="form-input" id="f_ba" type="number" step="0.01" placeholder="0.00" value="${b.totalAmount||b.amount||''}" oninput="calcBookingSplit()">
        </div>
        <div class="form-group" style="margin-bottom:0">
          <label class="form-label">Split Between # People</label>
          <input class="form-input" id="f_bsplit" type="number" min="1" placeholder="1" value="${b.splitPeople||1}" oninput="calcBookingSplit()">
        </div>
      </div>
      <div id="bk_split_result" style="margin-top:10px;padding:10px 12px;background:var(--accent-light);border-radius:var(--radius-sm);display:${(b.splitPeople&&b.splitPeople>1)?'flex':'none'};align-items:center;justify-content:space-between">
        <span style="font-size:.76rem;color:var(--text-mid)">My share</span>
        <span id="bk_split_val" style="font-family:var(--font-display);font-size:1.2rem;color:var(--accent)">${(b.splitPeople&&b.splitPeople>1)?'₱'+(parseFloat(b.totalAmount||b.amount||0)/parseInt(b.splitPeople)).toLocaleString('en',{minimumFractionDigits:2}):'₱0.00'}</span>
      </div>
    </div>
    <div class="fr2">
      <div class="form-group"><label class="form-label">Status</label>
        <select class="form-select" id="f_bs">
          ${['booked','confirmed','completed','cancelled'].map(s=>`<option${(b.status||'booked')===s?' selected':''}>${s}</option>`).join('')}
        </select>
      </div>
      <div class="form-group"><label class="form-label">Paid by</label>
        <input class="form-input" id="f_bpaidby" placeholder="e.g. Me, Sister, Mom" value="${b.paidBy||'Me'}">
      </div>
    </div>
    <div class="form-group">
      <label style="display:flex;align-items:center;gap:8px;cursor:pointer">
        <input type="checkbox" id="f_bpaid" ${b.paid?'checked':''} style="accent-color:var(--green);width:16px;height:16px">
        <span style="font-size:.82rem;font-weight:500;color:var(--text)">Mark as Paid</span>
      </label>
    </div>
    <div class="form-group"><textarea class="form-textarea" id="f_bno" rows="2" placeholder="Any extra details...">${b.notes||''}</textarea></div>
  `,()=>{
    const type = fv('f_bt');
    const isH = type === 'Accommodation';
    const date    = isH ? fv('f_bd')    : fv('f_bd2');
    const dateEnd = isH ? fv('f_bdend') : fv('f_bdend2');
    if(!date)    { alert('Please enter a start date.'); return; }
    if(!dateEnd) { alert('Please enter an end date.');  return; }
    const obj={
      id:id||uid(), destId:dId,
      name:fv('f_bn'), type,
      date, dateEnd,
      checkInTime:  isH ? fv('f_bckin')  : null,
      checkOutTime: isH ? fv('f_bckout') : null,
      bookingTime:  isH ? null : fv('f_btime'),
      confirmation:fv('f_bc'),
      totalAmount:fv('f_ba'),
      splitPeople:parseInt(fv('f_bsplit'))||1,
      amount:(parseFloat(fv('f_ba'))||0)/(parseInt(fv('f_bsplit'))||1),
      status:fv('f_bs'), paidBy:fv('f_bpaidby')||'Me', paid:document.getElementById('f_bpaid')?.checked||false, notes:fv('f_bno')
    };
    if(id) {
      const i=DB.bookings.findIndex(x=>x.id===id);
      // update linked expense if exists
      const oldB = DB.bookings[i];
      if(oldB._expId) {
        const ei = DB.expenses.findIndex(x=>x.id===oldB._expId);
        if(ei>-1) DB.expenses[ei]={...DB.expenses[ei],description:obj.name,amount:obj.amount,totalAmount:obj.totalAmount,splitPeople:obj.splitPeople,paidBy:obj.paidBy,paid:obj.paid,date:obj.date};
      }
      DB.bookings[i]={...obj,_expId:oldB._expId};
    } else {
      // auto-create expense entry in destination budget
      const expId = uid();
      const typeToCategory = {Flight:'Flights',Accommodation:'Accommodation',Train:'Transport',Ferry:'Transport',Bus:'Transport',Tour:'Activities',Restaurant:'Food',Other:'Other'};
      DB.expenses.push({id:expId,destId:dId,description:obj.name,category:typeToCategory[obj.type]||'Other',amount:obj.amount,totalAmount:obj.totalAmount,splitPeople:obj.splitPeople,paidBy:obj.paidBy,paid:obj.paid||false,date:obj.date,_fromBooking:true});
      obj._expId = expId;
      DB.bookings.push(obj);
    }
    save(); closeModal(); openDest(dId, currentDestTab);
  }, false, 'Save Booking');
}

function calcRecSplit() {

}

function updateBookingDateFields(type) {
  const isAccomm = type === 'Accommodation';
  const accEl = document.getElementById('bk_accomm');
  const otherEl = document.getElementById('bk_other');
  if(accEl) accEl.style.display = isAccomm ? 'block' : 'none';
  if(otherEl) otherEl.style.display = isAccomm ? 'none' : 'block';
  const timeLabel = document.getElementById('f_btime_label');

    const labels = {
      Flight:'Departure Time', Train:'Departure Time', Ferry:'Departure Time',
      Bus:'Required Arrival at Station', Tour:'Meeting / Departure Time',
      Restaurant:'Reservation Time', Other:'Booking Time'

  }
}

function previewMemPhotos(inp) {
  [...inp.files].forEach(f=>{ const r=new FileReader(); r.onload=e=>{ const d=document.createElement('div'); d.className='photo-item'; d.innerHTML=`<img src="${e.target.result}">`; document.getElementById('memPrev').appendChild(d); }; r.readAsDataURL(f); });
}

function togglePack(listId,idx,val) {
  const pl=DB.packingLists.find(l=>l.id===listId);
  if(pl){pl.items[idx].packed=val;save();openDest(currentDestId,currentDestTab);}
}
function addPackItem(listId,destId) {
  const inp=document.getElementById('pi_'+listId);
  const catEl=document.getElementById('pc_'+listId);
  const qtyEl=document.getElementById('pq_'+listId);
  if(!inp||!inp.value.trim()) return;
  const pl=DB.packingLists.find(l=>l.id===listId);
  if(pl){
    pl.items.push({
      name:inp.value.trim(),
      packed:false,
      category:catEl?catEl.value:'General',
      qty:parseInt(qtyEl?.value)||1
    });
    save();openDest(destId,currentDestTab);
  }
}

function removePackItem(listId,idx,destId) {
  const pl=DB.packingLists.find(l=>l.id===listId);
  if(pl){pl.items.splice(idx,1);save();openDest(destId,currentDestTab);}
}

function removePackItemEdit(idx, listId, destId) {

function ensureBuiltin() {
  if(!DB.programs.find(p=>p.id==='builtin_5day')) DB.programs.unshift(BUILTIN_PROGRAM);
}

function renderPrograms(c) {
  ensureBuiltin();
  c.innerHTML=`
  ${pageStack.length?backBtn('Back'):''}
  <div class="sec-head">
    <div class="sec-title">Fitness Programs (${DB.programs.length})</div>
    <div class="sec-actions">
      <select class="form-select" id="pfFilter" style="width:110px;font-size:.75rem" onchange="renderPrograms(document.getElementById('content'))">
        <option value="">All</option><option value="active">Active</option><option value="completed">Completed</option><option value="archived">Archived</option>
      </select>
      <button class="btn btn-primary" onclick="openProgramModal()">+ New Program</button>
    </div>
  </div>`;

const BUDGET_HASH = '7a3f9c2e1b8d4f6a0e5c7b9d2f4a8e1c3b5d7f9a2e4c6b8d0f2a4e6c8b0d2f4'; // salted

async function hashPassword(pw) {
  const encoder = new TextEncoder();
  const data = encoder.encode('lulu_budget_salt_' + pw);
  const hashBuffer = await crypto.subtle.digest('SHA-256', data);
  return Array.from(new Uint8Array(hashBuffer)).map(b=>b.toString(16).padStart(2,'0')).join('');
}

let budgetUnlocked = false;

function renderBudgetGate(c) {
  c.innerHTML = `
    <div style="display:flex;flex-direction:column;align-items:center;justify-content:center;min-height:60vh;gap:20px">
      <div style="font-size:2rem">🔒</div>
      <div style="font-family:var(--font-display);font-size:1.4rem;font-style:italic;color:var(--text)">Budget Tracker</div>
      <div style="font-size:.78rem;color:var(--text-light);text-align:center">This section is password protected.</div>
      <div style="width:100%;max-width:320px">
        <div class="form-group">
          <label class="form-label">Password</label>
          <input class="form-input" id="budgetPwInput" type="password" placeholder="Enter password"
            autocomplete="new-password" readonly onfocus="this.removeAttribute('readonly')"
            style="text-align:center;letter-spacing:.1em"
            onkeydown="if(event.key==='Enter') submitBudgetPw()">
        </div>
        <button class="btn btn-primary" style="width:100%;justify-content:center" onclick="submitBudgetPw()">Unlock</button>
        <div id="budgetPwErr" style="font-size:.74rem;color:var(--red);text-align:center;margin-top:8px;display:none">Incorrect password. Please try again.</div>
      </div>
    </div>`;
  setTimeout(()=>{ document.getElementById('budgetPwInput')?.focus(); }, 100);
}

async function submitBudgetPw() {
  const input = document.getElementById('budgetPwInput');
  if(!input) return;
  const pw = input.value;
  const hash = await hashPassword(pw);
  const correct = await hashPassword('$Jeinna1802$');
  if(hash === correct) {
    budgetUnlocked = true;
    try { sessionStorage.setItem('lulu_budget_unlocked', '1'); } catch(e){}
    renderBudget(document.getElementById('content'));
  } else {
    const err = document.getElementById('budgetPwErr');
    if(err) { err.style.display='block'; }
    input.value = '';
    input.focus();
  }
}
